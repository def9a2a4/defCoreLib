# Copper Pipes Display Configuration
# Display transformation settings for pipe visual rendering.
# Textures are defined in pipes.yml and loaded by CoreLib's BlockLoader.

# Display entity settings (shared across all variants)
display:
  # Base scale in the direction the pipe is facing
  facing-scale: 2.0
  # Scale in perpendicular directions
  perpendicular-scale: 0.998

# Corner pipe display settings
corner-pipe:
  display:
    scale: 1.1
    height: 0.775
    directional-forward-offset: 0.0
  # Destination adjustments for corner pipe directional display
  adjustments:
    destination:
      air:
        side: 0.0
        down: -0.5
      chest:
        side: 0.0625
        down: -0.1
      hopper:
        side: 0.106
        down: -0.05
      container:
        side: 0.0
        down: -0.18
      pipe-orthogonal:
        side: 0.23
        down: -0.01
      pipe-continuous:
        side: 0.0
        down: -0.18
      pipe-into:
        side: -0.75
        down: -0.5
      corner-pipe:
        side: 0.205
        down: -0.05
      corner-into:
        side: -0.75
        down: 0.0
      block:
        side: 0.0
        down: -0.5

# Global display adjustments for pipe endpoints
adjustments:
  # Where the BACK of the display terminates (source side)
  source:
    air:
      side: 0.5
      up: 0.5
      down: 0.5
    chest:
      side: 0.5625
      up: 0.5
      down: 0.625
    hopper:
      side: 0.59
      up: 0.75
      down: 0.75
    container:
      side: 0.5
      up: 0.5
      down: 0.5
    pipe-orthogonal:
      side: 0.5
      up: 0.5
      down: 0.5
    pipe-continuous:
      side: 0.5
      up: 0.5
      down: 0.5
    pipe-into:
      side: 0.5
      up: 0.5
      down: 0.5
    corner-into:
      side: 0.25
      up: 0.5
      down: 0.5
    block:
      side: 0.5
      up: 0.5
      down: 0.5

  # Where the FRONT of the display terminates (destination side)
  destination:
    air:
      side: -0.55
      up: -0.75
      down: -0.501
    chest:
      side: -0.4375
      up: -0.5
      down: -0.4
    hopper:
      side: -0.41
      up: -0.25
      down: -0.41
    container:
      side: -0.5
      up: -0.5
      down: -0.5
    pipe-orthogonal:
      side: -0.285
      up: -0.27
      down: -0.27
    pipe-continuous:
      side: -0.5
      up: -0.5
      down: -0.5
    pipe-into:
      side: -0.75
      up: -0.75
      down: -0.75
    corner-pipe:
      side: -0.31
      up: -0.3
      down: -0.25
    corner-into:
      side: -0.75
      up: -0.75
      down: 0.0
    block:
      side: -0.75
      up: -0.75
      down: -0.5

  # Global perpendicular offsets by pipe orientation
  global-offset:
    horizontal:
      right: 0.0
      up: 0.2495
    up:
      right: 0.0
      up: 0.0
    down:
      right: 0.0
      up: 0.0
