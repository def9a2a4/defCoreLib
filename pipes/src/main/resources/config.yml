# Copper Pipes Plugin Configuration

# World filter - control which worlds pipes can be used in
# mode: "allowlist" (only listed worlds) or "blocklist" (all except listed worlds)
# If mode is not set or empty, pipes are enabled in all worlds (default)
# worlds:
#   mode: blocklist
#   list:
#     - world_the_end

# Performance tuning
performance:
  sleep:
    source-empty-ticks: 60    # Ticks to sleep when source container is empty (0 to disable)
    dest-full-ticks: 80       # Ticks to sleep when destination is full (0 to disable)
    end-recheck-ticks: 40     # Ticks before rechecking a dead-end path for new containers

# Global settings
global:
  debug:
    # Show particles on active pipes
    particles: false
    # Particle spawn interval in ticks
    particle-interval: 10

# Pipe variants - define as many as needed
# Each variant defines behavior and transfer settings
variants:
  # Copper Pipe - standard pipe that pulls items from containers
  copper_pipe:
    behavior: REGULAR  # REGULAR or CORNER
    fluids: [water]          # pump-driven fluid transport; lava needs iron
    transfer:
      interval-ticks: 10
      items-per-transfer: 4

  # Copper Corner Pipe - only relays items, doesn't pull from containers
  copper_corner_pipe:
    behavior: CORNER
    fluids: [water]          # pump-driven fluid transport; lava needs iron
    transfer:
      interval-ticks: 10
      items-per-transfer: 4

  # Iron Pipe - standard pipe that pulls items from containers
  iron_pipe:
    behavior: REGULAR
    fluids: [water, lava]    # only iron can carry lava
    transfer:
      interval-ticks: 10
      items-per-transfer: 8

  # Iron Corner Pipe - only relays items, doesn't pull from containers
  iron_corner_pipe:
    behavior: CORNER
    fluids: [water, lava]    # only iron can carry lava
    transfer:
      interval-ticks: 10
      items-per-transfer: 8

  # Gold Pipe - standard pipe that pulls items from containers
  gold_pipe:
    behavior: REGULAR
    fluids: [water]          # pump-driven fluid transport; lava needs iron
    transfer:
      interval-ticks: 10
      items-per-transfer: 16

  # Gold Corner Pipe - only relays items, doesn't pull from containers
  gold_corner_pipe:
    behavior: CORNER
    fluids: [water]          # pump-driven fluid transport; lava needs iron
    transfer:
      interval-ticks: 10
      items-per-transfer: 16

  # Oxidized Copper Pipe - obtained via cauldron conversion
  oxidized_copper_pipe:
    behavior: REGULAR
    fluids: [water]          # pump-driven fluid transport; lava needs iron
    transfer:
      interval-ticks: 10
      items-per-transfer: 1

  # Oxidized Copper Corner Pipe - obtained via cauldron conversion
  oxidized_copper_corner_pipe:
    behavior: CORNER
    fluids: [water]          # pump-driven fluid transport; lava needs iron
    transfer:
      interval-ticks: 10
      items-per-transfer: 1

# Cauldron conversions - throw pipe item into water cauldron to convert
cauldron-conversions:
  copper_pipe: oxidized_copper_pipe
  copper_corner_pipe: oxidized_copper_corner_pipe

# Shapeless conversion recipes - craft pipe + catalyst to get converted pipe
# The catalyst item remains in the crafting grid after crafting (not consumed)
conversion-recipes:
  oxidized_copper_pipe:
    from-variant: copper_pipe
    catalyst: WATER_BUCKET
    result-amount: 1
  oxidized_copper_corner_pipe:
    from-variant: copper_corner_pipe
    catalyst: WATER_BUCKET
    result-amount: 1
