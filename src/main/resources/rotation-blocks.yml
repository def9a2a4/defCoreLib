  # ─── Clutch ─────────────────────────────────────────────────────────────
  # Transmitter: like a shaft, but disconnects when powered by redstone.
  clutch:
    name: "&cClutch"
    lore:
      - "&7Transmits rotation power"
      - "&7Disconnects when redstone powered"
    # Copper Block
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMWMyNjU4MDNkMWNjMmUzMWY3OTUxZmZlY2JlZjUwZTA3OGMzNjYyOWQ1ZDA5MDc4YjkxYmE0ZGNkNDRjYTI5YyJ9fX0="
