        texture: "@motor_fwd_dim"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 1.99, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: -0.01
      # Spinning: rotating shaft + spark particles — pwr head (running look)
      spinning_x:
        copy_from: idle_x
        texture: "@motor_fwd_pwr"
        animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 }
        particles:
          type: ELECTRIC_SPARK
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.5, 0]
      spinning_y:
        copy_from: idle_y
        texture: "@motor_up_pwr"
        animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 }
        particles:
          type: ELECTRIC_SPARK
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.5, 0]
      spinning_z:
        copy_from: idle_z
        texture: "@motor_fwd_pwr"
        animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 }
        particles:
          type: ELECTRIC_SPARK
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.5, 0]
    recipes:
      craft:
        shaped:
          # Like the engine, but redstone blocks in the top corners in place of copper —
