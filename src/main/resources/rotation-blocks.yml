  # ─── Millstone ──────────────────────────────────────────────────────────
  # Consumer: 1 Power. WALL only — mounts on a block and pulls from it if it's a
  # container; outputs into the container below (or drops below). Batch size
  # scales with surplus power. Powered from a shaft on top (Y axis).
  # Display: two smooth stone slabs — bottom static, top spins around Y.
  millstone:
    break_on_piston: true
    name: "&7Millstone"
    lore:
      - "&7Grinds items from its storage when powered"
      - "&7Powered from the top; grinds faster with more power; outputs below"
    catalog_notes:
      - "&fGrinds items from its own storage while powered by a shaft on top, dropping the results into a container below it."
      - "&7Grinds more per cycle the more surplus power the network has, up to a cap."
    # Stone machine head (shared with the press).
    texture: "@machine_base"
    item_texture: "@stone_slabs"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    default_state: idle
    states:
      # Two slabs stacked — bottom static, top rotates around Y when spinning.
      # Receives power from a shaft on top (UP face).
      idle:
        display_entities:
          - { material: SMOOTH_STONE_SLAB, tag: base_slab, transform: { translation: [0, 0.0, 0], scale: [0.8, 1.0, 0.8] }, animation: none }
          - { material: SMOOTH_STONE_SLAB, tag: top_slab,  transform: { translation: [0, 0.5, 0],  scale: [0.8, 1.0, 0.8] } }
      spinning: { copy_from: idle, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # A stack of two smooth stone slabs + copper on the right, topped by a
          # lightning rod (power intake) and a bearing.
          - pattern: [" LB", " MH", " MC"]
            key:
              L: { material: LIGHTNING_ROD }
              B: { block: "mech:bearing" }
              M: { material: SMOOTH_STONE_SLAB }
              C: { material: COPPER_INGOT }
              H: { material: HOPPER }

  # ─── Extractor Press ──────────────────────────────────────────────────────
  # Consumer: 1 Power. WALL only — mounts on a container, presses its contents into
  # outputs (juices, oils, extra dyes/sugar) ejected below. Powered from a shaft
  # on top (Y axis). Display (compressor): stone base + a bobbing smooth-stone slab
  # (the pressed material) under a downward-facing piston, with a shaft stub on top.
  press:
    break_on_piston: true
    name: "&fExtractor Press"
    lore:
      - "&7Presses items from its storage when powered"
      - "&7Powered from the top; squeezes out juices, oils & extracts below"
    catalog_notes:
      - "&fSqueezes items from its storage while powered by a shaft on top, dropping the results into a container below."
      - "&fThis is how you make the juices, oils, and extracts (like Sweet Berry Juice and Seed Oil) — see its recipes below."
      - "&7Presses more per cycle the more surplus power the network has, up to a cap."
    # Stone machine head (shared with the millstone); compressor item in hand.
    texture: "@machine_base"
    item_texture: "@compressor_item"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    default_state: idle
    states:
      # Geometry (world Y; display at block-center): base FLUSH (bottom 0, top 0.15);
      # anvil rest bottom 0.35 / top 0.5; piston rest bottom 0.5 (on the anvil); shaft [1.0,1.2].
      # Per-entity animations (independent amplitude/phase/speed): when powered the anvil +
      # piston bob together in phase (world-space bob, amplitude 0.2) → anvil bottom reaches
      # the base top (0.15) at the trough; the shaft spins; the base stays still.
      idle:
        display_entities:
          - { material: SMOOTH_STONE_SLAB, tag: base,  transform: { translation: [0, -0.25, 0],  scale: [0.9, 0.5, 0.9] } }
          - { material: SMOOTH_STONE_SLAB, tag: anvil, transform: { translation: [0, 0.025, 0],  scale: [0.75, 0.3, 0.75] } }
          - { material: PISTON,            tag: head,  transform: { translation: [0, 0.15, 0],   scale: [0.55, 0.25, 0.55], left_rotation: [180, 1, 0, 0] } }
          - { texture: "@rod_up",          tag: shaft, transform: { translation: [0, 0.5, 0],    scale: [0.66, 0.75, 0.66] } }
      spinning:
        display_entities:
          - { material: SMOOTH_STONE_SLAB, tag: base,  transform: { translation: [0, -0.25, 0],  scale: [0.9, 0.5, 0.9] } }
          - { material: SMOOTH_STONE_SLAB, tag: anvil, transform: { translation: [0, 0.025, 0],  scale: [0.75, 0.3, 0.75] }, animation: { type: bob, amplitude: 0.125, period: 80, phase: 0 } }
          - { material: PISTON,            tag: head,  transform: { translation: [0, 0.15, 0],   scale: [0.55, 0.25, 0.55], left_rotation: [180, 1, 0, 0] }, animation: { type: bob, amplitude: 0.125, period: 80, phase: 0 } }
          - { texture: "@rod_up",          tag: shaft, transform: { translation: [0, 0.5, 0],    scale: [0.66, 0.75, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # A stack of two smooth stone slabs + copper on the right, topped by a
          # piston (the press) flanked by two bearings.
          - pattern: ["BPB", " MH", " MC"]
            key:
              B: { block: "mech:bearing" }
              P: { material: PISTON }
              M: { material: SMOOTH_STONE_SLAB }
              C: { material: COPPER_INGOT }
              H: { material: HOPPER }

  # ─── Sieve ────────────────────────────────────────────────────────────────
  # Consumer: 1 Power. WALL only — mounts on a container, pans its gravel/sand/dirt
  # for nuggets, flint, and other small finds (all chance-based; see sieve-recipes.yml),
  # ejected below. Powered from a shaft on top (Y axis), like the millstone.
  # Display (millstone geometry): static slab base, spinning copper-grate mesh on top.
  sieve:
    break_on_piston: true
    name: "&6Sieve"
    lore:
      - "&7Pans items from its storage when powered — needs water"
      - "&7Powered from the top; sifts gravel & sand for nuggets, flint & finds below"
    catalog_notes:
      - "&fPans gravel, sand, red sand, dirt, and soul sand from its storage while powered by a shaft on top, dropping any finds into a container below."
      - "&fEvery find is chance-based — a cycle can wash an input away with nothing to show. Gravel is the ore-panning feedstock; sand is the fine-panning gamble."
      - "&fPanning needs WATER: right-click with a water bucket to fill its tank (or feed it by liquid pipe). It sips a bucket every so many pans and idles dry with a dusty rattle."
      - "&7Right-click with an empty hand to read the tank level."
    # Stone machine head (shared with the millstone/press); sieve skin in hand.
    texture: "@machine_base"
    item_texture: "@sieve_item"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    default_state: idle
    states:
      # Millstone-style split — bottom slab static, copper-grate mesh on top rotates
      # around Y when spinning. Receives power from a shaft on top (UP face).
      # Mesh fills the top half of the cell: 0.5 tall, center at 0.75.
      idle:
        display_entities:
          - { material: SMOOTH_STONE_SLAB, tag: base_slab, transform: { translation: [0, 0.0, 0], scale: [0.8, 1.0, 0.8] }, animation: none }
          - { material: COPPER_GRATE,      tag: mesh,      transform: { translation: [0, 0.25, 0], scale: [0.8, 0.5, 0.8] } }
      spinning: { copy_from: idle, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # A stack of two smooth stone slabs + copper on the right, topped by a
          # lightning rod (power intake) and a bearing; a copper grate as the mesh.
          - pattern: [" LB", " GH", " MC"]
            key:
              L: { material: LIGHTNING_ROD }
              B: { block: "mech:bearing" }
              G: { material: COPPER_GRATE }
              M: { material: SMOOTH_STONE_SLAB }
              C: { material: COPPER_INGOT }
              H: { material: HOPPER }

  # ─── Copper Water Pump ────────────────────────────────────────────────────
  # Consumer: 4 Power. FLOOR only, axle on X/Z from placement yaw (chain-hoist pattern) —
  # a shaft runs through it and power crosses to the far side. Moves ONE bucket-unit of
  # WATER per cycle vertically: intake below (source block / cauldron / tank), discharge
  # above (endpoint or pipe chain). Water only — lava pumping is reserved for a future
  # iron-tier pump. Wrench flips the flow direction.
  # Display: an up-pipe replica (the pipes plugin's mid-run vertical pipe render, widened
  # past 1 block-width so it fully covers the 0.5-wide skull underneath — at pipe
  # width 0.499 the skull's valve texture peeks through and reads as a misrotated block)
  # plus the thin copper-grate intake at the bottom and a through-shaft on the axle
  # (chain-hoist recipe) so the coupling axis is visible; the shaft spins while powered.
  pump:
    break_on_piston: true
    name: "&bCopper Water Pump"
    lore:
      - "&7Pumps a bucket of water upward each cycle when powered"
      - "&7Driven by a shaft through it; wrench flips the flow"
    catalog_notes:
      - "&fSits over its water: drains the source block, cauldron, or tank below and discharges one bucket per cycle to the block or pipe network above."
      - "&fPipes route the water to the first vessel that can take it — every pipe along the way must connect. Water only: it will not lift lava."
      - "&7Driven by a shaft running straight through it (the axle lies across your view as you place it); a wrench reverses the flow direction."
    texture: "@pump_valve_up"
    item_texture: "@pump_valve_up"
    drops: self
    default_state: idle_x
    # Floor only. X-vs-Z axle from the placer's yaw (RotationBlocks.axisPlacementState).
    # The through-shaft renders along that axle (idle_x = E-W, idle_z = N-S) — the same
    # axis RotationNetwork.axisFromState couples power on, so what you see is what
    # connects. Shaft transforms are the chain-hoist recipe (rod on the centerline).
    placement:
      allowed_faces: [DOWN]
    states:
      idle_x:
        display_entities:
          - texture: "@pipe_up_display"
            tag: body
            transform: { translation: [0, 0.5015, 0], scale: [1.06, 2.006, 1.06] }
          - { material: COPPER_GRATE, tag: intake, transform: { translation: [0, -0.59375, 0], scale: [0.75, 0.3125, 0.75] } }
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
      spinning_x:
        display_entities:
          - texture: "@pipe_up_display"
            tag: body
            transform: { translation: [0, 0.5015, 0], scale: [1.06, 2.006, 1.06] }
          - { material: COPPER_GRATE, tag: intake, transform: { translation: [0, -0.59375, 0], scale: [0.75, 0.3125, 0.75] } }
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
            animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 }
      idle_z:
        display_entities:
          - texture: "@pipe_up_display"
            tag: body
            transform: { translation: [0, 0.5015, 0], scale: [1.06, 2.006, 1.06] }
          - { material: COPPER_GRATE, tag: intake, transform: { translation: [0, -0.59375, 0], scale: [0.75, 0.3125, 0.75] } }
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
      spinning_z:
        display_entities:
          - texture: "@pipe_up_display"
            tag: body
            transform: { translation: [0, 0.5015, 0], scale: [1.06, 2.006, 1.06] }
          - { material: COPPER_GRATE, tag: intake, transform: { translation: [0, -0.59375, 0], scale: [0.75, 0.3125, 0.75] } }
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
            animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 }
    recipes:
      craft:
        shaped:
          # Copper shell: a pipe segment on top (the valve body), piston plunger and
          # bearing flanking the bucket chamber, a copper-grate intake screen at the
          # bottom. Uses the Pipes plugin's copper pipe — when Pipes is absent the
          # recipe is skipped entirely (unresolvable block ingredients skip the recipe).
          - pattern: ["CEC", "PUB", "CGC"]
            key:
              C: { material: COPPER_INGOT }
              E: { block: "pipes:copper_pipe" }
              P: { material: PISTON }
              U: { material: BUCKET }
              B: { block: "mech:bearing" }
              G: { material: COPPER_GRATE }

  # ─── Burner (steam stack, bottom) ─────────────────────────────────────────
  # Dumb fuel box: HOPPER storage burned down by the steam piston two blocks above
  # (shared EngineFuelManager, keyed here). Right-click opens the fuel GUI with a
  # seconds readout. Lit/unlit display driven by the piston. PLACEHOLDER art: a
  # blast-furnace shell.
  burner:
    break_on_piston: true
    name: "&cBurner"
    lore:
      - "&7Burns fuel to heat a boiler placed on top"
      - "&7Bottom of the steam stack: burner, boiler, steam piston"
    catalog_notes:
      - "&fThe firebox of the steam engine: load it with fuel (coal, wood, lava buckets — anything the engine burns) and stack a [Boiler](mech:boiler) and [Steam Piston](mech:steam_piston) on top."
      - "&7Right-click to open its fuel storage and read the remaining burn time."
    texture: "@burner_unlit"
    item_texture: "@burner_lit"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [DOWN]
    default_state: unlit
    states:
      # Bottom-aligned 12/16-tall shell (skull hidden; head-display models hang down from
      # their translation point, so top sits at 0.2525 − epsilon-scaled ≈ 12/16 above the
      # floor). Yaw comes from overlayBurner's displayTransformResolver: the shell fronts
      # whoever placed it (skull Rotatable, snapped to a cardinal on placement).
      # The cap grate is centered on its translation (material displays center; extent =
      # scale): spans shell top (~0.7525) to the top of the block cell.
      unlit:
        display_entities:
          - texture: "@burner_unlit"
            tag: shell
            transform: { translation: [0, 0.2525, 0], scale: [2.006, 1.5045, 2.006] }
          - { material: EXPOSED_COPPER_GRATE, tag: cap, transform: { translation: [0, 0.3765, 0], scale: [1.0, 0.248, 1.0] } }
      lit:
        display_entities:
          - texture: "@burner_lit"
            tag: shell
            transform: { translation: [0, 0.2525, 0], scale: [2.006, 1.5045, 2.006] }
          - { material: EXPOSED_COPPER_GRATE, tag: cap, transform: { translation: [0, 0.3765, 0], scale: [1.0, 0.248, 1.0] } }
        particles:
          type: FLAME
          count: 1
          speed: 0.01
          interval: 6
          floor_offset: [0, 0.75, 0]
    recipes:
      craft:
        shapeless:
          # A blast-furnace firebox + a dropper mechanism + a copper grate (any oxidation/waxed variant).
          - ingredients:
              - { material: BLAST_FURNACE }
              - { material: DROPPER }
              - { materials: [COPPER_GRATE, EXPOSED_COPPER_GRATE, WEATHERED_COPPER_GRATE, OXIDIZED_COPPER_GRATE, WAXED_COPPER_GRATE, WAXED_EXPOSED_COPPER_GRATE, WAXED_WEATHERED_COPPER_GRATE, WAXED_OXIDIZED_COPPER_GRATE] }

  # ─── Boiler (steam stack, middle) ─────────────────────────────────────────
  # A waxed copper chest in the world (dynamo pattern — tile entity, so FluidTanks
  # keeps the water level in the chest's own PDC; lockContainer default seals its
  # 27 slots; WAXED so it never oxidizes). Shell display = casing/dynamo placement.
  # Fill by liquid pipe (machine-tank endpoint) or water-bucket right-click. Flame
  # particles while the stack runs (driven by the steam piston above).
  boiler:
    name: "&fBoiler"
    lore:
      - "&7Boils piped-in water over a burner; a steam piston on top makes power"
      - "&7Middle of the steam stack: burner, boiler, steam piston"
    catalog_notes:
      - "&fHolds the steam engine's water: stack it on a [Burner](mech:burner), put a [Steam Piston](mech:steam_piston) on top, and keep it fed — by [Copper Water Pump](mech:pump) and pipes, or by hand with water buckets."
      - "&7The running stack sips a bucket of water roughly every minute and stops dry."
    physical_material: WAXED_COPPER_CHEST
    cancel_pistons: true
    texture: "@copper_tank"
    item_texture: "@copper_tank"
    drops: self
    default_state: idle
    states:
      # The casing/dynamo shell placement verbatim: cover the chest being disguised.
      idle:
        display_entities:
          - texture: "@copper_tank"
            tag: shell
            transform: { translation: [0, 0.501, 0], scale: [2.006, 2.006, 2.006] }
      running:
        copy_from: idle
    recipes:
      craft:
        shaped:
          # A copper tank with glass sight windows around the bucket chamber.
          - pattern: ["CCC", "GUG", "CCC"]
            key:
              C: { material: COPPER_INGOT }
              G: { material: GLASS }
              U: { material: BUCKET }

  # ─── Steam Piston (steam stack, top) ──────────────────────────────────────
  # The stack's SOURCE: 20 Power on its horizontal X/Z axle (chain-hoist placement —
  # floor only, axle across the placer's view, power exits both sides at piston level).
  # Runs only while the boiler below has water and the burner below that is burning.
  # Display (PLACEHOLDER art): piston body + a bobbing head plate + spinning axle rod,
  # steam clouds while running. Mixed per-entity animations, so no state-level shortcut.
  steam_piston:
    break_on_piston: true
    name: "&fSteam Piston"
    lore:
      - "&720 Power while its boiler and burner below are fed"
      - "&7Top of the steam stack; drives shafts along its axle"
    catalog_notes:
      - "&fThe strongest power source: stack it on a [Boiler](mech:boiler) over a [Burner](mech:burner), feed fuel and water, and it drives 20 Power into shafts on both sides of its axle."
      - "&7The axle lies across your view as you place it; a wrench reads out the network."
    texture: "@piston_copper"
    item_texture: "@piston_copper"
    drops: self
    placement:
      allowed_faces: [DOWN]
    default_state: idle_x
    states:
      idle_x:
        display_entities:
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [-0.5, 0, 0], scale: [0.6, 2.002, 0.6], left_rotation: [90, 0, 0, 1] }
          - { material: COPPER_BLOCK, tag: head, transform: { translation: [0, 0, 0],  scale: [0.75, 0.75, 0.75] } }
      running_x:
        display_entities:
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [-0.5, 0, 0], scale: [0.6, 2.002, 0.6], left_rotation: [90, 0, 0, 1] }
            animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 }
          - material: COPPER_BLOCK
            tag: head
            transform: { translation: [0, 0, 0], scale: [0.75, 0.75, 0.75] }
            animation: { type: bob, amplitude: 0.125, period: 40, phase: 0 }
        particles:
          type: WHITE_SMOKE
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.9, 0]
      idle_z:
        display_entities:
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [0, 0, -0.5], scale: [0.6, 2.002, 0.6], left_rotation: [-90, 1, 0, 0] }
          - { material: COPPER_BLOCK, tag: head, transform: { translation: [0, 0, 0],  scale: [0.75, 0.75, 0.75] } }
      running_z:
        display_entities:
          - texture: "@rod_up"
            tag: axle
            transform: { translation: [0, 0, -0.5], scale: [0.6, 2.002, 0.6], left_rotation: [-90, 1, 0, 0] }
            animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 }
          - material: COPPER_BLOCK
            tag: head
            transform: { translation: [0, 0, 0], scale: [0.75, 0.75, 0.75] }
            animation: { type: bob, amplitude: 0.125, period: 40, phase: 0 }
        particles:
          type: WHITE_SMOKE
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.9, 0]
    recipes:
      craft:
        shaped:
          # A gear between bearings (the crank) over a piston in a copper frame.
          # Two rows — placeable at any height in the 3x3 grid.
          - pattern: ["BEB", "CPC"]
            key:
              B: { block: "mech:bearing" }
              E: { block: "mech:gear" }
              C: { material: COPPER_INGOT }
              P: { material: PISTON }

  # ─── Block Placer ─────────────────────────────────────────────────────────
  # Consumer: 1 Power. WALL only — mounts on a container and places its blocks into
  # the cell in front (the facing direction) when powered, one per cycle. Powered from
  # a shaft on top (Y axis), like the millstone. Vanilla blocks only; skips custom
  # plugin blocks and non-block items. Facing is read from the wall-head block data.
  # Display (placeholder): a scaled dispenser body — the vanilla block-placing machine.
  placer:
    break_on_piston: true
    name: "&aBlock Placer"
    lore:
      - "&7Places blocks from its storage in front when powered"
      - "&7Powered from the top by a shaft"
    catalog_notes:
      - "&fMounts on a wall over a container and places its stored blocks into the space in front of it, one per cycle, while powered by a shaft on top."
      - "&7Vanilla blocks only — it skips custom plugin blocks and anything that isn't a placeable block."
    # Placed head = stone machine head (shared with the millstone/press); item = placer skin.
    texture: "@machine_base"
    item_texture: "@placer_item"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST, UP]
    # Per-wall states orient the dispenser's front face OUTWARD (where it places blocks), like the
    # drill. Placement key = attachment/wall face = getFacing().getOppositeFace(); the dispenser
    # faces the opposite (outward), so state `idle_X` ⇒ dispenser faces X ⇒ places toward X.
    # The dispenser is a corner-anchored BlockDisplay, so translation -scale/2 recenters the cube:
    # a near-full 0.9 body reads as MOUNTED in the cell rather than floating in it. `wall_offset: 0.1`
    # then shifts it -facing·0.1 (see BasicMechanism.applyWallOffset), sinking its back into the wall
    # so the front face clears the piston plate instead of swallowing it.
    # Powered cue = the plate PUMPS toward the cell it places into — a `bob` along the facing axis
    # (per state: n → [0,0,-1], s → [0,0,1], e → [1,0,0], w → [-1,0,0]). The plate's own front-face
    # position stays orientation-agnostic via `wall_offset: -0.375` (= +facing·0.375). The top
    # @rod_up shaft is the real power intake, so it stays and keeps its spin. Shaft copied from press.
    # UP = ceiling placement: a floating head (see playerHeadStates in overlayPlacer) that stores
    # facing DOWN — pulls from the container above and places into the cell below, powered from any
    # side (omni). No top shaft (power arrives from a side) and no wall_offset either: that's live-
    # gated on PLAYER_WALL_HEAD (CustomBlockRegistry ~1162), so a ceiling head must bake its offsets
    # straight into `translation`. A @pipe_up_display stub caps the join with the container above and
    # is STATIC — the pump is the powered cue here too, matching the walls. One symmetric pair (a
    # ceiling head has no yaw).
    # Geometry cheat-sheet (both display kinds spawn at block CENTER, so the cell spans ±0.5):
    #   BlockDisplay (block_data) is corner-anchored, model [0,1]³ → spans y ∈ [ty, ty+sy].
    #   ItemDisplay (texture) HANGS DOWN from its origin, extent 0.5 at scale 1 → y ∈ [ty-0.5·sy, ty],
    #   xz ∈ tx ± 0.25·s. (Ground truth: the shaft's full-block idle_y rod is translation [0,0.5,0]
    #   scale [.66,2.002,.66] → y ∈ [-0.501, 0.5], exactly the cell. The file header's "bottom in Y"
    #   describes the head's own model space; ItemDisplay centering renders it below the origin.)
    # So the ceiling body at ty=-0.51 spans [-0.51, 0.39] — 0.01 proud of the cell floor, leaving the
    # top 0.11 clear for the pipe stub (ty=0.5, scale 1 → y ∈ [0, 0.5], top flush with the cell).
    default_state: idle_n
    placement_state_map: { NORTH: idle_s, SOUTH: idle_n, EAST: idle_w, WEST: idle_e, UP: idle_ceiling }
    states:
      idle_n:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=north]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_n:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=north]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375, animation: { type: bob, amplitude: 0.1, period: 16, axis: [0, 0, -1] } }
      idle_s:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=south]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_s:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=south]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375, animation: { type: bob, amplitude: 0.1, period: 16, axis: [0, 0, 1] } }
      idle_e:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=east]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_e:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=east]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375, animation: { type: bob, amplitude: 0.1, period: 16, axis: [1, 0, 0] } }
      idle_w:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=west]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_w:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=west]", tag: body, transform: { translation: [-0.45, -0.45, -0.45], scale: [0.9, 0.9, 0.9] }, wall_offset: 0.1 }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375, animation: { type: bob, amplitude: 0.1, period: 16, axis: [-1, 0, 0] } }
      # Ceiling-only placed head: the placer's own item skin instead of the block-level @machine_base
      # machine face. Per-state `texture:` is resolved by CustomHeadBlock.resolveTexture and re-applied
      # by applyConfig on every idle⇄spinning flip, so it survives the RotationNetwork toggle. Same
      # pattern as the shaft block's per-axis ring skins above.
      idle_ceiling:
        texture: "@placer_item"
        display_entities:
          - { block_data: "minecraft:dispenser[facing=down]", tag: body,   transform: { translation: [-0.45, -0.51, -0.45], scale: [0.9, 0.9, 0.9] } }
          - { texture: "@placer_piston",                      tag: piston, transform: { translation: [0, -0.375, 0],        scale: [0.5, 0.5, 0.5] } }
          - { texture: "@pipe_up_display",                    tag: pipe,   transform: { translation: [0, 0.5, 0],           scale: [1, 1, 1] } }
      spinning_ceiling:
        texture: "@placer_item"
        display_entities:
          - { block_data: "minecraft:dispenser[facing=down]", tag: body,   transform: { translation: [-0.45, -0.51, -0.45], scale: [0.9, 0.9, 0.9] } }
          - { texture: "@placer_piston",                      tag: piston, transform: { translation: [0, -0.375, 0],        scale: [0.5, 0.5, 0.5] }, animation: { type: bob, amplitude: 0.1, period: 16, axis: [0, -1, 0] } }
          - { texture: "@pipe_up_display",                    tag: pipe,   transform: { translation: [0, 0.5, 0],           scale: [1, 1, 1] } }
    recipes:
      craft:
        shaped:
          # Dispenser core (vanilla's block placer) + bearing power intake on top,
          # piston arm below, copper on the sides.
          - pattern: [" BH", "CDC", " P "]
            key:
              B: { block: "mech:bearing" }
              D: { material: DISPENSER }
              C: { material: COPPER_INGOT }
              P: { material: PISTON }
              H: { material: HOPPER }

  # ─── Mechanical Dispenser ─────────────────────────────────────────────────
  # A REAL vanilla DISPENSER (physical_material) wearing two glowing red-eye item displays and a
  # custom "Mechanical Dispenser" name. Unpowered it IS a vanilla dispenser — GUI, hoppers, item pipes,
  # and redstone are all vanilla (the Java overlay sets lockContainer(false)). Fed rotation power from
  # ANY face (omni consumer, MechanicalDispenser.java) it launches whatever it dispenses faster and
  # straighter along its facing — arrows fly harder, TNT is thrown forward, items sail out — scaling
  # with the network's spare power up to a cap. `placement: { facing: toward_player }` gives it the
  # vanilla dispenser placement rule (face the placer, incl. up/down); the eyes ride the mouth face,
  # rotated to the live facing by the overlay's display resolver.
  mechanical_dispenser:
    name: "&cMechanical Dispenser"
    lore:
      - "&7A dispenser with a rotation-driven"
      - "&7launcher: powered dispenses fly"
      - "&7faster and straighter"
    catalog_notes:
      - "&fWorks exactly like a vanilla dispenser until you feed it rotation power from any side."
      - "&fPowered, it launches arrows and items harder and straighter — extra speed scales with the network's total power, up to a cap."
      - "&fDispensed TNT is thrown forward instead of dropping in place."
      - "&7Wrench: show network debug info."
    physical_material: DISPENSER
    texture: "@mechanical_dispenser"
    placement: { facing: toward_player }
    drops: self
    cancel_pistons: true
    default_state: idle
    states:
      idle:
        # Two red item-display "eyes", each exactly 1px × 2px × 1px (1px=1/16 block), pixel-aligned to
        # the world grid. Authored for FACING=SOUTH (+Z); MechanicalDispenser.eyeTransform rotates them onto
        # the live facing (Faces.rotationForFace maps +Z → outward normal), and for up/down flattens them
        # to either side in X, centered on Z. physical_material item displays render fullbright → glow.
        #   x = ±2.5/16  → 1px-wide eyes in pixel columns 5 and 10 (4px gap), symmetric about centre.
        #                  (eyeTransform also uses this X as the ±X spread on up/down faces.)
        #   y = +2/16    → 2px-tall, faces on pixel lines (rows 9-11). Side facings only — eyeTransform
        #                  zeros Y on up/down so those eyes stay centered on Z.
        #   z = 8.5/16   → 1px-deep, proud in the pixel cell just outside the 0.5 face (faces at 0.5 and
        #                  0.5625; the coplanar inner face is self-occluded, so no z-fight).
        display_entities:
          - { material: RED_CONCRETE, tag: eye_l, transform: { translation: [-0.15625, 0.125, 0.53125], scale: [0.0625, 0.125, 0.0625] } }
          - { material: RED_CONCRETE, tag: eye_r, transform: { translation: [ 0.15625, 0.125, 0.53125], scale: [0.0625, 0.125, 0.0625] } }
    recipes:
      craft:
        shaped:
          # Slime cap over a piston flanked by two bearings (rotation coupling), above a dispenser + redstone.
          - pattern: [" S ", "BPB", "RDR"]
            key:
              S: { material: SLIME_BLOCK }
              B: { block: "mech:bearing" }
              P: { material: PISTON }
              D: { material: DISPENSER }
              R: { material: REDSTONE }

  # ─── Drill ──────────────────────────────────────────────────────────────
  # Consumer: 1 Power. Breaks the block in its facing direction every 2s.
  drill:
    cancel_pistons: true
    name: "&8Drill"
    lore:
      - "&7Breaks blocks when powered"
      - "&7Mines in facing direction"
    catalog_notes:
      - "&fMounts on a wall and breaks the block directly in front of it while it has power."
      - "&fThe drill face is the wall face you click when placing — it mines away from that wall."
      - "&7Breaking runs in stages (like real mining), so harder blocks take longer to pop."
      - "&cWon't break: obsidian, crying obsidian, spawners, reinforced deepslate, and moving pistons."
    texture: "@drill_head"
    item_texture: "@screw_fwd"
    drops: self
    recipes:
      craft:
        shaped:
          - pattern: [" D ", "INI", "IPI"]
            key:
              D: { material: DIAMOND }
              I: { material: IRON_INGOT }
              N: { material: NETHERITE_INGOT }
              P: { material: PISTON }
    default_state: idle_z
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST, UP, DOWN]
    # Wall entries: the static skull renders correctly with the straight (not crossed) mapping — leave
    # these as-is. UP = attached to the block above → hangs, mines DOWN (ceiling). DOWN = attached to the
    # block below → sits on top, mines UP (floor). Both resolve to a floating PLAYER_HEAD via playerHeadStates.
    placement_state_map:
      NORTH: idle_z
      SOUTH: idle_south_z
      EAST: idle_east_x
      WEST: idle_x
      UP: idle_ceiling
      DOWN: idle_y
    states:
      idle_ceiling:
        # Placed head shows the screw skin; a static drill-placed-down collar sits near the top,
        # widened in x/z; the screw hangs below and (in spinning_ceiling) rotates about Y.
        texture: "@screw_up"
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, -0.5, 0], scale: [1.0, 1.0, 1.0], left_rotation: [180, 1, 0, 0] }
          - texture: "@drill_placed_down"
            tag: collar
            transform: { translation: [0, 0.5, 0], scale: [1.333, 1.0, 1.333] }
      spinning_ceiling:
        # Written out (not copy_from) so animation applies only to the screw, leaving the collar static.
        texture: "@screw_up"
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, -0.5, 0], scale: [1.0, 1.0, 1.0], left_rotation: [180, 1, 0, 0] }
            animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 }
          - texture: "@drill_placed_down"
            tag: collar
            transform: { translation: [0, 0.5, 0], scale: [1.333, 1.0, 1.333] }
      idle_y:
        texture: "@drill_placed_up"
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 1.0, 0.66] }
      spinning_y: { copy_from: idle_y, texture: "@drill_placed_up", animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      idle_x:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [90, 0, 0, 1] }
      spinning_x: { copy_from: idle_x, animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      idle_east_x:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [-90, 0, 0, 1] }
      spinning_east_x: { copy_from: idle_east_x, animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      idle_z:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [-90, 1, 0, 0] }
      spinning_z: { copy_from: idle_z, animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
      idle_south_z:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [90, 1, 0, 0] }
      spinning_south_z: { copy_from: idle_south_z, animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }

  # ─── Windmill ───────────────────────────────────────────────────────────
  # Source: 1 Power. Always spinning. Regular tier — 0.75 scale, NORMAL banners.
  windmill:
    cancel_pistons: true
    name: "&aWindmill"
    lore:
      - "&7Produces 1 Power"
      - "&7Always spinning"
      - "&7Use Large/Huge banners for a bigger windmill"
    catalog_notes:
      - "&fA passive power source — it spins on its own, with no fuel or redstone needed."
      - "&fThe banner patterns from the four banners you craft it with show up on the blades, so a dyed/patterned banner makes a custom windmill."
      - "&7Craft with plain banners for this tier; use Large or Huge banners to get the Large/Huge Windmill instead."
      - "&7Places on the floor (spins flat) or on a wall (spins like a wheel)."
    texture: "@large_windmill"
    item_texture: "@windmill_item"
    drops: self
    break_sound: { sound: BLOCK_WOOD_BREAK, volume: 0.8, pitch: 1.0 }
    place_sound: { sound: BLOCK_WOOD_PLACE, volume: 0.8, pitch: 1.0 }
    default_state: floor
    placement_state_map:
      DOWN: floor
      NORTH: wall_s
      SOUTH: wall_n
      EAST: wall_e
      WEST: wall_w
    states:
      floor:
        texture: "@windmill_hub_up"
        display_entities:
          - { material: WHITE_BANNER, tag: blade_a, transform: { translation: [0.375, -0.2, 0],    scale: [0.75, 0.75, 0.75], left_rotation: [120, 1, 1, -1] } }
