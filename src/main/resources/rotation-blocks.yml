          - { material: WHITE_BANNER, tag: blade_b, transform: { translation: [0, 0, 0.1875],  scale: [0.375, 0.375, 0.375], left_rotation: [120, 1, -1, -1] }, wall_offset: -0.001 }
          - { material: WHITE_BANNER, tag: blade_c, transform: { translation: [0, -0.1875, 0], scale: [0.375, 0.375, 0.375], left_rotation: [180, 1, 0, -1] }, wall_offset: -0.001 }
          - { material: WHITE_BANNER, tag: blade_d, transform: { translation: [0, 0, -0.1875], scale: [0.375, 0.375, 0.375], left_rotation: [-120, 1, 1, -1] }, wall_offset: -0.001 }
      spinning_wall_w: { copy_from: idle_wall_w, texture: "@fan_placed_fwd", animation: { type: rotate, axis: [1, 0, 0], speed: 6.0 } }
      idle_wall_e:
        texture: "@fan_placed_fwd"
        display_entities:
          - { material: WHITE_BANNER, tag: blade_a, transform: { translation: [0, 0.1875, 0],  scale: [0.375, 0.375, 0.375], left_rotation: [90, 0, 1, 0] }, wall_offset: -0.001 }
          - { material: WHITE_BANNER, tag: blade_b, transform: { translation: [0, 0, 0.1875],  scale: [0.375, 0.375, 0.375], left_rotation: [120, 1, 1, 1] }, wall_offset: -0.001 }
          - { material: WHITE_BANNER, tag: blade_c, transform: { translation: [0, -0.1875, 0], scale: [0.375, 0.375, 0.375], left_rotation: [180, 1, 0, 1] }, wall_offset: -0.001 }
          - { material: WHITE_BANNER, tag: blade_d, transform: { translation: [0, 0, -0.1875], scale: [0.375, 0.375, 0.375], left_rotation: [-120, 1, -1, 1] }, wall_offset: -0.001 }
      spinning_wall_e: { copy_from: idle_wall_e, texture: "@fan_placed_fwd", animation: { type: rotate, axis: [1, 0, 0], speed: 6.0 } }
    recipes:
      craft:
        shaped:
          # Bearing core, 4 banners in a +, redstone dust in the corners.
          - pattern: ["RBR", "BYB", "RBR"]
            key:
              R: { material: REDSTONE }
              B: { tag: banners }
              Y: { block: "mech:bearing" }

  # ─── Suction Hopper ───────────────────────────────────────────────────
  # Consumer: 1 Power. Fan + hopper. While powered, pulls dropped items from a 3×3×3
  # cube inward, captures the ones in its own cell into a 5-slot hopper inventory, and
  # feeds the container/pipe it's mounted on (below on the floor, into the wall on a wall).
  # With no container it holds the items. Unlike other machines it takes rotation power
  # from any of its five open faces (dynamic axis pick in RotationBlocks.overlaySuctionHopper).
  # Display: a hopper facing the mount + the fan's blades on the outward face (spin when
  # powered). The hopper block-display carries animation:none so only the blades spin.
  # Placement key = mount/wall face (getFacing().getOppositeFace()); hopper spout = that face.
  # Blade transforms mirror the fan; the hopper is a corner-anchored BlockDisplay so its
  # translation is -scale/2 to recenter. Wall blade offsets may want in-game tuning.
  suction_hopper:
    cancel_pistons: true
    name: "&bSuction Hopper"
    lore:
      - "&7Pulls nearby dropped items inward while powered"
      - "&7Captures them and feeds the container it's mounted on"
      - "&7Powered from any side that isn't its mount"
    catalog_notes:
      - "&fWhile powered it sucks dropped items from a 3×3×3 area into itself, then pushes them into the container it's placed on (below on the floor, or into the wall)."
      - "&fUnlike most machines it takes rotation power from a shaft on any of its five open faces."
      - "&fIt feeds vanilla containers directly, and also pushes into a pipe mounted below it (when the Pipes plugin is present)."
      - "&7With no container to output into, it just holds the items in its own inventory."
    texture: "@machine_base"
    item_texture: "@fan_item"
    drops: self
    storage: { layout: HOPPER }
    break_sound: { sound: BLOCK_WOOD_BREAK, volume: 0.8, pitch: 1.0 }
    place_sound: { sound: BLOCK_METAL_PLACE, volume: 0.8, pitch: 1.0 }
    default_state: idle_floor
    placement_state_map:
      DOWN: idle_floor
      NORTH: idle_wall_s
      SOUTH: idle_wall_n
      EAST: idle_wall_e
      WEST: idle_wall_w
    states:
      # Floor: spout down (into the block below), blades on top spinning around Y.
      idle_floor:
        texture: "@hopper_floor"
        display_entities:
          - { block_data: "minecraft:hopper[facing=down]", tag: hopper, transform: { translation: [-0.49, -0.615, -0.49], scale: [0.98, 0.98, 0.98] }, animation: none }
          - { block_data: "minecraft:white_carpet", tag: blade_a, transform: { translation: [-0.5, 0.346875, -0.15], scale: [1.0, 0.5, 0.3] } }
          - { block_data: "minecraft:white_carpet", tag: blade_b, transform: { translation: [-0.15, 0.356875, -0.5], scale: [0.3, 0.5, 1.0] } }
      spinning_floor: { copy_from: idle_floor, texture: "@hopper_floor", animation: { type: rotate, axis: [0, 1, 0], speed: 6.0 } }
      # Wall states: spout points into the mounted wall (= the placement key); blades mirror the
      # fan's matching wall state and spin around the wall's normal axis (Z for n/s, X for e/w).
      idle_wall_n:
        display_entities:
          - { block_data: "minecraft:hopper[facing=down]", tag: hopper, transform: { translation: [-0.49, -0.49, 0.49], scale: [0.98, 0.98, 0.98], left_rotation: [-90, 1, 0, 0] }, wall_offset: 0.125, animation: none }
          - { block_data: "minecraft:white_carpet", tag: blade_a, transform: { translation: [-0.5, 0.15, -0.015625], scale: [1.0, 0.5, 0.3], left_rotation: [90, 1, 0, 0] }, wall_offset: -0.375 }
          - { block_data: "minecraft:white_carpet", tag: blade_b, transform: { translation: [-0.15, 0.5, -0.005625], scale: [0.3, 0.5, 1.0], left_rotation: [90, 1, 0, 0] }, wall_offset: -0.375 }
      spinning_wall_n: { copy_from: idle_wall_n, animation: { type: rotate, axis: [0, 0, 1], speed: 6.0 } }
      idle_wall_s:
        display_entities:
          - { block_data: "minecraft:hopper[facing=down]", tag: hopper, transform: { translation: [-0.49, 0.49, -0.49], scale: [0.98, 0.98, 0.98], left_rotation: [90, 1, 0, 0] }, wall_offset: 0.125, animation: none }
          - { block_data: "minecraft:white_carpet", tag: blade_a, transform: { translation: [-0.5, 0.15, -0.015625], scale: [1.0, 0.5, 0.3], left_rotation: [90, 1, 0, 0] }, wall_offset: -0.375 }
          - { block_data: "minecraft:white_carpet", tag: blade_b, transform: { translation: [-0.15, 0.5, -0.005625], scale: [0.3, 0.5, 1.0], left_rotation: [90, 1, 0, 0] }, wall_offset: -0.375 }
      spinning_wall_s: { copy_from: idle_wall_s, animation: { type: rotate, axis: [0, 0, 1], speed: 6.0 } }
      idle_wall_w:
        display_entities:
          - { block_data: "minecraft:hopper[facing=down]", tag: hopper, transform: { translation: [-0.49, 0.49, -0.49], scale: [0.98, 0.98, 0.98], left_rotation: [-90, 0, 0, 1] }, wall_offset: 0.125, animation: none }
          - { block_data: "minecraft:white_carpet", tag: blade_a, transform: { translation: [0.015625, -0.5, -0.15], scale: [1.0, 0.5, 0.3], left_rotation: [90, 0, 0, 1] }, wall_offset: -0.375 }
          - { block_data: "minecraft:white_carpet", tag: blade_b, transform: { translation: [0.025625, -0.15, -0.5], scale: [0.3, 0.5, 1.0], left_rotation: [90, 0, 0, 1] }, wall_offset: -0.375 }
      spinning_wall_w: { copy_from: idle_wall_w, animation: { type: rotate, axis: [1, 0, 0], speed: 6.0 } }
      idle_wall_e:
        display_entities:
          - { block_data: "minecraft:hopper[facing=down]", tag: hopper, transform: { translation: [0.49, -0.49, -0.49], scale: [0.98, 0.98, 0.98], left_rotation: [90, 0, 0, 1] }, wall_offset: 0.125, animation: none }
          - { block_data: "minecraft:white_carpet", tag: blade_a, transform: { translation: [0.015625, -0.5, -0.15], scale: [1.0, 0.5, 0.3], left_rotation: [90, 0, 0, 1] }, wall_offset: -0.375 }
          - { block_data: "minecraft:white_carpet", tag: blade_b, transform: { translation: [0.025625, -0.15, -0.5], scale: [0.3, 0.5, 1.0], left_rotation: [90, 0, 0, 1] }, wall_offset: -0.375 }
      spinning_wall_e: { copy_from: idle_wall_e, animation: { type: rotate, axis: [1, 0, 0], speed: 6.0 } }
    recipes:
      craft:
        shapeless:
          - ingredients:
              - { block: "mech:fan" }
              - { material: HOPPER }

  # ─── Mechanism Minecart ──────────────────────────────────────────────
  # Item-only (placeable: false): right-clicking a rail spawns a minecart entity.
  # Spawn/tick/assemble/destroy logic lives in MechanismMinecartManager (Java).
  mechanism_minecart:
    name: "&6Mechanism Minecart"
    lore:
      - "&7Right-click a rail to spawn a cart."
      - "&7Glue blocks to it, then power an"
      - "&7activator rail to assemble & ride them."
    catalog_notes:
      - "&fRight-click a rail to spawn a cart, then glue blocks onto it with the [Glue Brush](mech:glue_item)."
      - "&fPush it onto a powered activator rail (or right-click the cart) to assemble the glued blocks into a rideable moving structure; another activator rail disassembles it back into blocks."
      - "&7It's an item you use on a rail, not a block you place in the world."
    item_material: FURNACE_MINECART
    item_glint: true
    placeable: false
    recipes:
      craft:
        shaped:
          - pattern: ["IPI", "ROR", " M "]
            key:
              I: { material: IRON_INGOT }
              P: { material: STICKY_PISTON }
              R: { material: REDSTONE }
              O: { block: "mech:rotator" }
              M: { material: MINECART }

  # ─── Extendable Piston (arm-only MVP) ───────────────────────────────────
  # A fixed piston_core draws rotational power from any adjacent shaft/gear (omni consumer). Along its
  # pole line [poles][CORE][poles][HEAD], the whole rod slides by spin direction: CW extends, CCW
  # retracts. Behaviour lives in ExtendablePistonManager.java. Placeholder textures for now.
  # Directional: placement face sets "forward" (the extend axis + direction). The core reads its own
  # fwd_* state to know which way to push. placedOn → forward = away from the surface.
  piston_core:
    name: "&bPiston Core"
    lore:
      - "&7Rotation-powered piston base"
      - "&7Spin CW to extend, CCW to retract"
    catalog_notes:
      - "&fThe powered base of an extendable piston. Feed it rotational power from any side."
      - "&7Build a line of piston poles through it, capped by a piston head; reach = poles behind the core."
      - "&7Placement decides 'forward' — the direction it pushes."
    # Full-block cube display (2x head = 1 block on all axes), like the windmill hub. core-up for the
    # vertical facings (floor/ceiling), core-fwd for the four horizontal (wall) facings, turned about Y.
    texture: "@core_up"
    item_texture: "@core_fwd"
    drops: self
    default_state: fwd_up
    placement_state_map:
      DOWN: fwd_up
      NORTH: fwd_south
      SOUTH: fwd_north
      EAST: fwd_west
      WEST: fwd_east
    states:
      fwd_up:
        texture: "@core_up"
        display_entities:
          - texture: "@core_up"
            tag: core
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004] }
      fwd_down:
        texture: "@core_up"
        display_entities:
          - texture: "@core_up"
            tag: core
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004] }
      fwd_south:
        texture: "@core_fwd"
        display_entities:
          - texture: "@core_fwd"
            tag: core
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004] }
            wall_offset: 0.001
      fwd_west:
        texture: "@core_fwd"
        display_entities:
          - texture: "@core_fwd"
            tag: core
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004], left_rotation: [90, 0, 1, 0] }
            wall_offset: 0.001
      fwd_north:
        texture: "@core_fwd"
        display_entities:
          - texture: "@core_fwd"
            tag: core
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004], left_rotation: [180, 0, 1, 0] }
            wall_offset: 0.001
      fwd_east:
        texture: "@core_fwd"
        display_entities:
          - texture: "@core_fwd"
            tag: core
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004], left_rotation: [270, 0, 1, 0] }
            wall_offset: 0.001
    recipes:
      craft:
        shaped:
          - pattern: ["III", "IBI", "III"]
            key:
              I: { material: IRON_INGOT }
              B: { block: "mech:bearing" }
  # Axis-oriented like a log/shaft: the placement face sets the rod's axis (idle_x/y/z).
  piston_pole:
    name: "&bPiston Pole"
    lore:
      - "&7Extension segment — add more behind"
      - "&7the core for a longer throw"
    # Toothed rod, 0.501 blocks wide (scale 1.002) — same pattern as the shaft but not narrowed.
    texture: "@rod_toothed_up"
    item_texture: "@rod_toothed_fwd"
    drops: self
    cancel_pistons: true
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      idle_y:
        texture: "@rod_toothed_up"
        display_entities:
          - texture: "@rod_toothed_up"
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [1.002, 2.002, 1.002] }
      idle_x:
        texture: "@rod_toothed_up"
        display_entities:
          - texture: "@rod_toothed_up"
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [1.002, 2.002, 1.002], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
      idle_z:
        texture: "@rod_toothed_up"
        display_entities:
          - texture: "@rod_toothed_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [1.002, 2.002, 1.002], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
    recipes:
      craft:
        shaped:
          - pattern: ["I", "I"]
            key:
              I: { material: IRON_INGOT }
  piston_head:
    name: "&bPiston Head"
    lore:
      - "&7The pushing face at the end of the rod"
    # Two display entities: a toothed pole-stub (idx 0) + a wide cap (idx 1). Both transforms are computed
    # at runtime by ExtendablePistonManager's displayTransformResolver so they point AWAY from the adjacent
    # pole ("outward"). The transforms below are placeholder fallbacks for the outward=+axis case.
    texture: "@head_up"
    item_texture: "@head_fwd"
    drops: self
    cancel_pistons: true
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Fallbacks match the resolver's +axis output (outward = +axis): idle_y→UP, idle_x→EAST, idle_z→SOUTH.
      # Cap display always uses @head_up (rotated by rotationFor); @head_fwd is the in-hand item only. Stub
      # inner-flush to the pole; cap 0.5-thick plate nudged 0.25 down (floor) / 0.25 toward the pole (wall).
      idle_y:
        texture: "@head_up"
        display_entities:
          - texture: "@rod_toothed_up"
            tag: pole
            transform: { translation: [0, 0.4, 0], scale: [1.002, 1.8, 1.002] }
          - texture: "@head_up"
            tag: cap
            transform: { translation: [0, 0.5, 0], scale: [2.004, 1.0, 2.004] }
      idle_x:
        texture: "@head_fwd"
        display_entities:
          - texture: "@rod_toothed_up"
            tag: pole
            transform: { translation: [0.4, 0, 0], scale: [1.002, 1.8, 1.002], left_rotation: [-90, 0, 0, 1] }
            wall_offset: 0.001
          - texture: "@head_fwd"
            tag: cap
            transform: { translation: [0.25, 0.501, 0], scale: [2.004, 2.004, 1.0], left_rotation: [90, 0, 1, 0] }
            wall_offset: 0.001
      idle_z:
        texture: "@head_fwd"
        display_entities:
          - texture: "@rod_toothed_up"
            tag: pole
            transform: { translation: [0, 0, 0.4], scale: [1.002, 1.8, 1.002], left_rotation: [90, 1, 0, 0] }
            wall_offset: 0.001
          - texture: "@head_fwd"
            tag: cap
            transform: { translation: [0, 0.501, 0.25], scale: [2.004, 2.004, 1.0] }
            wall_offset: 0.001
    recipes:
      craft:
        shaped:
          - pattern: ["II", "II"]
            key:
              I: { material: IRON_INGOT }
