    lore:
      - "&7Transmits rotational power"
    catalog_notes:
      - "&fA transmitter: it carries rotation power in a straight line along the axis it points."
      - "&7Produces and consumes nothing on its own — use shafts to route power from a source to a machine."
    # Placed head: copper shaft ring (orientation-dependent per state). Item: copper rod.
    texture: "@shaft_ring_fwd"
    item_texture: "@rod_fwd"
    drops: self
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Y-axis: default head orientation
      idle_y:
        texture: "@shaft_ring_up"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 2.002, 0.66] }
      spinning_y: { copy_from: idle_y, texture: "@shaft_ring_up", animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      # X-axis: rotate head 90° around Z so height→-X
      idle_x:
        texture: "@shaft_ring_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
      spinning_x: { copy_from: idle_x, texture: "@shaft_ring_fwd", animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      # Z-axis: rotate head -90° around X so height→Z
      idle_z:
        texture: "@shaft_ring_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
      spinning_z: { copy_from: idle_z, texture: "@shaft_ring_fwd", animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
    recipes:
      craft:
        shapeless:
          - ingredients:
              - { material: LIGHTNING_ROD }
              - { material: COPPER_INGOT }

  # ─── Gear ───────────────────────────────────────────────────────────────
  # Transmitter: connects perpendicular gears + along-axis like a shaft.
  # Display: shaft rod + two overlapping discs at 45° offset.
  # 0.4 depth (0.2 blocks thick), 1.7 width. disc_b offset 0.01 from disc_a in
  # rotation axis (z-fight). Walls use per-wall states (mirror of the drill):
  # each disc is translated 0.3 toward the wall it's placed on, and opposite walls
  # use MIRRORED left_rotations (east/south negate west/north). The mirror is
  # required because the head display is anchored off-center along the rotation —
  # reusing one rotation on both walls would shift the disc ~0.25 to one side.
  # shaft_rod = exact copy of the standalone shaft. No wall_offset on the gear.
  # disc_b LR = compose(orientation_LR, R_Y(45°)):
  #   Y: [45, 0, 1, 0]
  #   X: R_Z(90) × R_Y(45) = [98.42, -0.3574, 0.3574, 0.8629]
  #   Z: R_X(-90) × R_Y(45) = [98.42, -0.8629, 0.3574, -0.3574]
  gear:
    break_on_piston: true
    name: "&6Gear"
    lore:
      - "&7Transfers power along axis"
      - "&7Connects perpendicular gears"
    catalog_notes:
      - "&fWorks like a shaft, but also meshes with gears on its perpendicular sides."
      - "&fUse it to turn power around a 90° corner, or to split one input into several directions."
      - "&7Still carries power straight along its own axis, just like a shaft."
    # Placed head: copper shaft ring (orientation-dependent per state).
    texture: "@shaft_ring_fwd"
    # Copper Gear (item in hand)
    item_texture: "@copper_gear"
    drops: self
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_south_z
      EAST: idle_east_x
      WEST: idle_x
    states:
      # ── Y-axis gear (floor): discs lowered onto seated head, shaft rod up ──
      idle_y:
        texture: "@shaft_ring_up"
        display_entities:
          - texture: "@rod_up"
            tag: shaft_rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 2.002, 0.66] }
          - texture: "@gear_up"
            tag: disc_a
            transform: { translation: [0, -0.29, 0], scale: [1.7, 0.4, 1.7] }
          - texture: "@gear_up"
            tag: disc_b
            transform: { translation: [0, -0.28, 0], scale: [1.7, 0.4, 1.7], left_rotation: [45, 0, 1, 0] }
      spinning_y: { copy_from: idle_y, texture: "@shaft_ring_up", animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      # ── X-axis gear (E/W wall): disc pulled to the wall; shaft_rod = standalone shaft ──
      idle_x:
        texture: "@shaft_ring_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: shaft_rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
          - texture: "@gear_up"
            tag: disc_a
            transform: { translation: [-0.45, 0, 0], scale: [1.7, 0.4, 1.7], left_rotation: [90, 0, 0, 1] }
          - texture: "@gear_up"
            tag: disc_b
            transform: { translation: [-0.46, 0, 0], scale: [1.7, 0.4, 1.7], left_rotation: [98.42, -0.3574, 0.3574, 0.8629] }
      spinning_x: { copy_from: idle_x, texture: "@shaft_ring_fwd", animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      idle_east_x:
        texture: "@shaft_ring_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: shaft_rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
          - texture: "@gear_up"
            tag: disc_a
            transform: { translation: [0.45, 0, 0], scale: [1.7, 0.4, 1.7], left_rotation: [-90, 0, 0, 1] }
          - texture: "@gear_up"
            tag: disc_b
            transform: { translation: [0.46, 0, 0], scale: [1.7, 0.4, 1.7], left_rotation: [98.42, 0.3574, 0.3574, -0.8629] }
      spinning_east_x: { copy_from: idle_east_x, texture: "@shaft_ring_fwd", animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      # ── Z-axis gear (N/S wall): disc pulled to the wall; shaft_rod = standalone shaft ──
      idle_z:
        texture: "@shaft_ring_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: shaft_rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
          - texture: "@gear_up"
            tag: disc_a
            transform: { translation: [0, 0, -0.45], scale: [1.7, 0.4, 1.7], left_rotation: [-90, 1, 0, 0] }
          - texture: "@gear_up"
            tag: disc_b
            transform: { translation: [0, 0, -0.46], scale: [1.7, 0.4, 1.7], left_rotation: [98.42, -0.8629, 0.3574, -0.3574] }
      spinning_z: { copy_from: idle_z, texture: "@shaft_ring_fwd", animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
      idle_south_z:
        texture: "@shaft_ring_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: shaft_rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
          - texture: "@gear_up"
            tag: disc_a
            transform: { translation: [0, 0, 0.45], scale: [1.7, 0.4, 1.7], left_rotation: [90, 1, 0, 0] }
          - texture: "@gear_up"
            tag: disc_b
            transform: { translation: [0, 0, 0.46], scale: [1.7, 0.4, 1.7], left_rotation: [98.42, 0.8629, 0.3574, 0.3574] }
      spinning_south_z: { copy_from: idle_south_z, texture: "@shaft_ring_fwd", animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # Iron core, copper in a +, lightning rod in the (canonical top-left) corner.
          - pattern: ["LC ", "CIC", " C "]
            key:
              L: { material: LIGHTNING_ROD }
              C: { material: COPPER_INGOT }
              I: { material: IRON_INGOT }

  # ─── Chain Pulley ───────────────────────────────────────────────────────
  # Transmitter (powers along its axis like a shaft) that can also be linked to a second pulley by a
  # chain, jumping rotational power across a gap. Right-click one pulley with a CHAIN to select, then
  # a second to link (max 10 blocks). Power flows only once the links form a CLOSED loop. Placeholder
  # art reuses the shaft-ring + gear-disc heads; the network/link behavior is overlaid in ChainPulley.java.
  chain_pulley:
    cancel_pistons: true
    name: "&eChain Pulley"
    lore:
      - "&7Links rotational power across a gap"
      - "&7Chain two pulleys into a loop"
    catalog_notes:
      - "&fA transmitter you can link to other pulleys with a chain."
      - "&7Right-click one pulley with a chain, then another, to link them — uses chains equal to the distance."
      - "&7Power flows only around a closed loop of three or more pulleys, and each link draws a little power."
    texture: "@windmill_hub_up"
    item_texture: "@chainwheel"
    drops: self
    default_state: idle_y
    # Floor placement only (placedOn resolves to DOWN); wall placements are rejected.
    placement:
      allowed_faces: [DOWN]
    placement_state_map:
      DOWN: idle_y
    states:
      # Bearing hub skull (texture @bearing) with a large spinning chainwheel display entity on top.
      # spinning_* inherits the display and adds a rotate animation about its axis.
      # (idle_x/z + spinning_x/z are unreachable under floor-only placement but kept for completeness.)
      idle_y:
        texture: "@windmill_hub_up"
        display_entities:
          - texture: "@chainwheel"
            tag: wheel
            transform: { translation: [0, 0.5, 0], scale: [1.5, 1.2, 1.5] }
      spinning_y: { copy_from: idle_y, texture: "@windmill_hub_up", animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      idle_x:
        texture: "@windmill_hub_up"
        display_entities:
          - texture: "@chainwheel"
            tag: wheel
            transform: { translation: [0, 0.5, 0], scale: [1.5, 1.2, 1.5], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
      spinning_x: { copy_from: idle_x, texture: "@windmill_hub_up", animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      idle_z:
        texture: "@windmill_hub_up"
        display_entities:
          - texture: "@chainwheel"
            tag: wheel
            transform: { translation: [0, 0.5, 0], scale: [1.5, 1.2, 1.5], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
      spinning_z: { copy_from: idle_z, texture: "@windmill_hub_up", animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
      # Texture-only pseudo-state: never entered by the network; exists so ChainPulley.java can read
      # the @chain base64 via resolveTexture("strand", ...) for the runtime strand display.
      strand: { texture: "@chain" }
    recipes:
      craft:
        shaped:
          # A bearing surrounded by chains.
          - pattern: ["CCC", "CBC", "CCC"]
            key:
              C: { material: IRON_CHAIN }
              B: { block: "mech:bearing" }

  # ─── Clutch ─────────────────────────────────────────────────────────────
  # Transmitter: like a shaft, but disconnects when powered by redstone.
  clutch:
    break_on_piston: true
    name: "&cClutch"
    lore:
      - "&7Transmits rotation power"
      - "&7Disconnects when redstone powered"
    catalog_notes:
      - "&fA shaft you can switch off: give it a redstone signal and it disconnects, cutting power from passing through."
      - "&7With no redstone signal it passes power normally, like a plain shaft."
      - "&7Handy as a clutch/gate to start and stop a branch of your network."
    # Copper bearing head (orientation-dependent per state).
    texture: "@clutch_fwd"
    item_texture: "@clutch_fwd"
    drops: self
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Standard shaft display (same as mech:shaft). Shown in all states —
      # locked just stops the spin; the shaft stays visible.
      idle_x:
        texture: "@clutch_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
      idle_y:
        texture: "@clutch_up"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 2.002, 0.66] }
      idle_z:
        texture: "@clutch_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
      spinning_x: { copy_from: idle_x, texture: "@clutch_fwd", animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      spinning_y: { copy_from: idle_y, texture: "@clutch_up", animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      spinning_z: { copy_from: idle_z, texture: "@clutch_fwd", animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
      locked_x: { copy_from: idle_x, texture: "@clutch_fwd" }
      locked_y: { copy_from: idle_y, texture: "@clutch_up" }
      locked_z: { copy_from: idle_z, texture: "@clutch_fwd" }
    recipes:
      craft:
        shaped:
          # Bearing core, iron on one side; copper corners, redstone dust top & bottom,
          # lightning rod on the other side.
          - pattern: ["CRC", "LBI", "CRC"]
            key:
              C: { material: COPPER_INGOT }
              R: { material: REDSTONE }
              L: { material: LIGHTNING_ROD }
              B: { block: "mech:bearing" }
              I: { material: IRON_INGOT }

  # ─── Reverser ───────────────────────────────────────────────────────────
  # Transmitter: like a shaft, but REVERSES spin direction when redstone powered.
  # Stays connected (unlike the clutch, which disconnects). Along-axis only.
  reverser:
    cancel_pistons: true
    name: "&dReverser"
    lore:
      - "&7Transmits rotation power"
      - "&7Reverses spin direction when redstone powered"
    catalog_notes:
      - "&fFlips the spin direction when it gets a redstone signal — but stays connected, unlike the clutch which disconnects."
      - "&7Use it to make part of a network turn the opposite way (e.g. to close a door driven by the same source)."
    # Reverser head (orientation-dependent per state).
    texture: "@reverser_fwd"
    item_texture: "@reverser_fwd"
    drops: self
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Standard shaft display (same as mech:shaft).
      idle_x:
        texture: "@reverser_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
      idle_y:
        texture: "@reverser_up"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 2.002, 0.66] }
      idle_z:
        texture: "@reverser_fwd"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
      spinning_x: { copy_from: idle_x, texture: "@reverser_fwd", animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      spinning_y: { copy_from: idle_y, texture: "@reverser_up", animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      spinning_z: { copy_from: idle_z, texture: "@reverser_fwd", animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # Like the clutch, but a second bearing in place of the iron core.
          - pattern: ["CRC", "LBB", "CRC"]
            key:
              C: { material: COPPER_INGOT }
              R: { material: REDSTONE }
              L: { material: LIGHTNING_ROD }
              B: { block: "mech:bearing" }

  # ─── Rotator ────────────────────────────────────────────────────────────
  # Consumer hinge: floor = door (Y), wall = drawbridge (X/Z). Network spin direction
  # CW opens, CCW closes. Swings its glued structure as a mechanism (the blocks authored
  # with the Glue Brush, or just the attached block when nothing is glued). Right-click to
  # cycle the open angle (90/180/270).
  rotator:
    cancel_pistons: true
    name: "&dRotator"
    lore:
      - "&7Swings blocks glued to it as a door/drawbridge"
      - "&7Floor = door, wall = drawbridge"
      - "&7Right-click: cycle open angle"
    catalog_notes:
      - "&fA hinge that swings a structure: on the floor it acts like a door, on a wall like a drawbridge."
      - "&fGlue the blocks you want it to move with the [Glue Brush](mech:glue_item) — any blocks work. With nothing glued it just swings the single block it's attached to."
      - "&fThe network's spin direction decides which way it swings — one direction opens, the other closes."
      - "&7Right-click to cycle how far it opens (90°, 180°, or 270°)."
    # Hinge head: plated copper bearing (orientation-dependent per state).
    texture: "@rotator_side"
    item_texture: "@rotator_side"
    drops: self
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Standard shaft display (same as mech:shaft) + oriented hinge head.
      idle_x:
        texture: "@rotator_side"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.002, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: 0.001
      idle_y:
        texture: "@rotator_up"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 2.002, 0.66] }
      idle_z:
        texture: "@rotator_side"
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.002, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: 0.001
      spinning_x: { copy_from: idle_x, texture: "@rotator_side", animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      spinning_y: { copy_from: idle_y, texture: "@rotator_up", animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      spinning_z: { copy_from: idle_z, texture: "@rotator_side", animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # Like the clutch, but a sticky piston (the hinge actuator) replaces the
          # lightning rod.
          - pattern: ["CRC", "SBI", "CRC"]
            key:
              C: { material: COPPER_INGOT }
              R: { material: REDSTONE }
              S: { material: STICKY_PISTON }
              B: { block: "mech:bearing" }
              I: { material: IRON_INGOT }

  # ─── Water Wheel ────────────────────────────────────────────────────────
  # Source: 2 Power. Wall only. Spins when water is on perpendicular faces.
  # Display: 4 OAK_SLAB paddles at 90° intervals.
  water_wheel:
    break_on_piston: true
    name: "&bWater Wheel"
    lore:
      - "&7Produces 2 Power when adjacent to water"
      - "&7Place on a wall"
    catalog_notes:
      - "&fA source worth 2 Power. Mount it on a wall with water touching it (still or flowing) and it spins from the current."
      - "&7Needs water alongside it (its top and sides) to turn — no water, no power. A passive source otherwise (no fuel)."
    # Placed hub head = windmill hub (copber2-fwd, same as bearing); item = copper wheel.
    texture: "@windmill_hub_fwd"
    item_texture: "@water_wheel_copper"
    drops: self
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    default_state: idle_z
    placement_state_map:
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Z-axis (N/S wall): 8 oak-plank paddles radial in XY plane; 2x hub head at center.
      idle_z:
        display_entities:
          - texture: "@windmill_hub_fwd"
            tag: hub
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004] }
            animation: none
            wall_offset: 0.001
          - { material: OAK_PLANKS, tag: paddle_0, transform: { translation: [0, 0.65, 0],       scale: [0.0625, 1, 0.48], left_rotation: [0, 0, 0, 1] },    wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_1, transform: { translation: [0.46, 0.46, 0],    scale: [0.0625, 1, 0.48], left_rotation: [-45, 0, 0, 1] },   wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_2, transform: { translation: [0.65, 0, 0],       scale: [0.0625, 1, 0.48], left_rotation: [-90, 0, 0, 1] },   wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_3, transform: { translation: [0.46, -0.46, 0],   scale: [0.0625, 1, 0.48], left_rotation: [-135, 0, 0, 1] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_4, transform: { translation: [0, -0.65, 0],      scale: [0.0625, 1, 0.48], left_rotation: [-180, 0, 0, 1] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_5, transform: { translation: [-0.46, -0.46, 0],  scale: [0.0625, 1, 0.48], left_rotation: [-225, 0, 0, 1] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_6, transform: { translation: [-0.65, 0, 0],      scale: [0.0625, 1, 0.48], left_rotation: [-270, 0, 0, 1] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_7, transform: { translation: [-0.46, 0.46, 0],   scale: [0.0625, 1, 0.48], left_rotation: [-315, 0, 0, 1] },  wall_offset: 0.01 }
      spinning_z: { copy_from: idle_z, animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
      # X-axis (E/W wall): 8 oak-plank paddles radial in YZ plane; 2x hub head at center.
      idle_x:
        display_entities:
          - texture: "@windmill_hub_fwd"
            tag: hub
            transform: { translation: [0, 0.501, 0], scale: [2.004, 2.004, 2.004], left_rotation: [90, 0, 1, 0] }
            animation: none
            wall_offset: 0.001
          - { material: OAK_PLANKS, tag: paddle_0, transform: { translation: [0, 0.65, 0],       scale: [0.48, 1, 0.0625], left_rotation: [0, 1, 0, 0] },    wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_1, transform: { translation: [0, 0.46, 0.46],    scale: [0.48, 1, 0.0625], left_rotation: [45, 1, 0, 0] },   wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_2, transform: { translation: [0, 0, 0.65],       scale: [0.48, 1, 0.0625], left_rotation: [90, 1, 0, 0] },   wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_3, transform: { translation: [0, -0.46, 0.46],   scale: [0.48, 1, 0.0625], left_rotation: [135, 1, 0, 0] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_4, transform: { translation: [0, -0.65, 0],      scale: [0.48, 1, 0.0625], left_rotation: [180, 1, 0, 0] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_5, transform: { translation: [0, -0.46, -0.46],  scale: [0.48, 1, 0.0625], left_rotation: [225, 1, 0, 0] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_6, transform: { translation: [0, 0, -0.65],      scale: [0.48, 1, 0.0625], left_rotation: [270, 1, 0, 0] },  wall_offset: 0.01 }
          - { material: OAK_PLANKS, tag: paddle_7, transform: { translation: [0, 0.46, -0.46],   scale: [0.48, 1, 0.0625], left_rotation: [315, 1, 0, 0] },  wall_offset: 0.01 }
      spinning_x: { copy_from: idle_x, animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # Bearing axle ringed by 8 wooden plank slabs (any wood) — the paddle wheel.
          - pattern: ["SSS", "SBS", "SSS"]
            key:
              S: { tag: wooden_slabs }
              B: { block: "mech:bearing" }

  # ─── Engine ─────────────────────────────────────────────────────────────
  # Source: 5 Power. Needs fuel (coal, charcoal, etc). Any orientation.
  # Shaft display entity shows rotation direction. Smoke particles when running.
  engine:
    break_on_piston: true
    name: "&4Engine"
    lore:
      - "&7Produces 5 Power when fueled"
      - "&7Right-click to open fuel storage"
    catalog_notes:
      - "&fThe strongest source at 5 Power, but it burns fuel — right-click to open its fuel slot."
      - "&fEats the usual furnace fuels: coal, charcoal, blaze rods, lava buckets, logs, planks, sticks, and so on. Higher-value fuels last longer."
      - "&7Puffs smoke while it's running. Can face any direction."
    # Bronze Ship Engine (9172c1e7)
    texture: "@bronze_engine"
    drops: self
    storage: { layout: HOPPER }
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Idle: static shaft display showing axis direction
      idle_x:
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 1.99, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: -0.01
      idle_y:
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0.51, 0], scale: [0.66, 1.99, 0.66] }
      idle_z:
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 1.99, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: -0.01
      # Running: spinning shaft + smoke particles
      running_x:
        copy_from: idle_x
        animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 }
        particles:
          type: CAMPFIRE_COSY_SMOKE
          count: 1
          speed: 0.02
          interval: 10
          floor_offset: [0, 0.8, 0]
      running_y:
        copy_from: idle_y
        animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 }
        particles:
          type: CAMPFIRE_COSY_SMOKE
          count: 1
          speed: 0.02
          interval: 10
          floor_offset: [0, 0.8, 0]
      running_z:
        copy_from: idle_z
        animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 }
        particles:
          type: CAMPFIRE_COSY_SMOKE
          count: 1
          speed: 0.02
          interval: 10
          floor_offset: [0, 0.8, 0]
    recipes:
      craft:
        shaped:
          # Blast furnace core flanked by pistons, bearing on top, copper base & corners.
          - pattern: ["CBC", "PFP", "CCC"]
            key:
              C: { material: COPPER_INGOT }
              B: { block: "mech:bearing" }
              P: { material: PISTON }
              F: { material: BLAST_FURNACE }

  # ─── Redstone Motor ────────────────────────────────────────────────────
  # Source: 1 Power. Always on unless receiving redstone power. Expensive to craft.
  # Shaft display entity shows rotation direction. Spark particles when active.
  redstone_motor:
    name: "&5Redstone Motor"
    lore:
      - "&7Produces 1 Power constantly"
      - "&7Turns off when redstone powered"
    catalog_notes:
      - "&fA steady 1-Power source that runs on its own — no fuel needed."
      - "&fInverted redstone: it runs while UNpowered and switches OFF when you give it a redstone signal, so you can gate it with a lever or clock."
      - "&7Expensive to craft, but maintenance-free once placed."
    # Copper Bulb Powered (83acdced)
    texture: "@copper_bulb"
    drops: self
    default_state: spinning_y
    placement_state_map:
      DOWN: spinning_y
      NORTH: spinning_z
      SOUTH: spinning_z
      EAST: spinning_x
      WEST: spinning_x
    states:
      # Idle: static shaft, no particles (redstone-disabled)
      idle_x:
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 1.99, 0.66], left_rotation: [90, 0, 0, 1] }
            wall_offset: -0.01
      idle_y:
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0.51, 0], scale: [0.66, 1.99, 0.66] }
      idle_z:
        display_entities:
          - texture: "@rod_up"
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 1.99, 0.66], left_rotation: [-90, 1, 0, 0] }
            wall_offset: -0.01
      # Spinning: rotating shaft + spark particles
      spinning_x:
        copy_from: idle_x
        animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 }
        particles:
          type: ELECTRIC_SPARK
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.5, 0]
      spinning_y:
        copy_from: idle_y
        animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 }
        particles:
          type: ELECTRIC_SPARK
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.5, 0]
      spinning_z:
        copy_from: idle_z
        animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 }
        particles:
          type: ELECTRIC_SPARK
          count: 1
          speed: 0.01
          interval: 8
          floor_offset: [0, 0.5, 0]
    recipes:
      craft:
        shaped:
          # Like the engine, but redstone blocks in the top corners in place of copper —
          # always-on unless redstone-powered.
          - pattern: ["EBE", "PFP", "CCC"]
            key:
              E: { material: REDSTONE_BLOCK }
              B: { block: "mech:bearing" }
              P: { material: PISTON }
              F: { material: BLAST_FURNACE }
              C: { material: COPPER_INGOT }

  # ─── Millstone ──────────────────────────────────────────────────────────
  # Consumer: 1 Power. WALL only — mounts on a block and pulls from it if it's a
  # container; outputs into the container below (or drops below). Batch size
  # scales with surplus power. Powered from a shaft on top (Y axis).
  # Display: two smooth stone slabs — bottom static, top spins around Y.
  millstone:
    break_on_piston: true
    name: "&7Millstone"
    lore:
      - "&7Grinds items from its storage when powered"
      - "&7Powered from the top; grinds faster with more power; outputs below"
    catalog_notes:
      - "&fGrinds items from its own storage while powered by a shaft on top, dropping the results into a container below it."
      - "&7Grinds more per cycle the more surplus power the network has, up to a cap."
    # Stone machine head (shared with the press).
    texture: "@machine_base"
    item_texture: "@stone_slabs"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    default_state: idle
    states:
      # Two slabs stacked — bottom static, top rotates around Y when spinning.
      # Receives power from a shaft on top (UP face).
      idle:
        display_entities:
          - { material: SMOOTH_STONE_SLAB, tag: base_slab, transform: { translation: [0, 0.0, 0], scale: [0.8, 1.0, 0.8] }, animation: none }
          - { material: SMOOTH_STONE_SLAB, tag: top_slab,  transform: { translation: [0, 0.5, 0],  scale: [0.8, 1.0, 0.8] } }
      spinning: { copy_from: idle, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # A stack of two smooth stone slabs + copper on the right, topped by a
          # lightning rod (power intake) and a bearing.
          - pattern: [" LB", " MH", " MC"]
            key:
              L: { material: LIGHTNING_ROD }
              B: { block: "mech:bearing" }
              M: { material: SMOOTH_STONE_SLAB }
              C: { material: COPPER_INGOT }
              H: { material: HOPPER }

  # ─── Extractor Press ──────────────────────────────────────────────────────
  # Consumer: 1 Power. WALL only — mounts on a container, presses its contents into
  # outputs (juices, oils, extra dyes/sugar) ejected below. Powered from a shaft
  # on top (Y axis). Display (compressor): stone base + a bobbing smooth-stone slab
  # (the pressed material) under a downward-facing piston, with a shaft stub on top.
  press:
    break_on_piston: true
    name: "&fExtractor Press"
    lore:
      - "&7Presses items from its storage when powered"
      - "&7Powered from the top; squeezes out juices, oils & extracts below"
    catalog_notes:
      - "&fSqueezes items from its storage while powered by a shaft on top, dropping the results into a container below."
      - "&fThis is how you make the juices, oils, and extracts (like Sweet Berry Juice and Seed Oil) — see its recipes below."
      - "&7Presses more per cycle the more surplus power the network has, up to a cap."
    # Stone machine head (shared with the millstone); compressor item in hand.
    texture: "@machine_base"
    item_texture: "@compressor_item"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    default_state: idle
    states:
      # Geometry (world Y; display at block-center): base FLUSH (bottom 0, top 0.15);
      # anvil rest bottom 0.35 / top 0.5; piston rest bottom 0.5 (on the anvil); shaft [1.0,1.2].
      # Per-entity animations (independent amplitude/phase/speed): when powered the anvil +
      # piston bob together in phase (world-space bob, amplitude 0.2) → anvil bottom reaches
      # the base top (0.15) at the trough; the shaft spins; the base stays still.
      idle:
        display_entities:
          - { material: SMOOTH_STONE_SLAB, tag: base,  transform: { translation: [0, -0.25, 0],  scale: [0.9, 0.5, 0.9] } }
          - { material: SMOOTH_STONE_SLAB, tag: anvil, transform: { translation: [0, 0.025, 0],  scale: [0.75, 0.3, 0.75] } }
          - { material: PISTON,            tag: head,  transform: { translation: [0, 0.15, 0],   scale: [0.55, 0.25, 0.55], left_rotation: [180, 1, 0, 0] } }
          - { texture: "@rod_up",          tag: shaft, transform: { translation: [0, 0.5, 0],    scale: [0.66, 0.75, 0.66] } }
      spinning:
        display_entities:
          - { material: SMOOTH_STONE_SLAB, tag: base,  transform: { translation: [0, -0.25, 0],  scale: [0.9, 0.5, 0.9] } }
          - { material: SMOOTH_STONE_SLAB, tag: anvil, transform: { translation: [0, 0.025, 0],  scale: [0.75, 0.3, 0.75] }, animation: { type: bob, amplitude: 0.125, period: 80, phase: 0 } }
          - { material: PISTON,            tag: head,  transform: { translation: [0, 0.15, 0],   scale: [0.55, 0.25, 0.55], left_rotation: [180, 1, 0, 0] }, animation: { type: bob, amplitude: 0.125, period: 80, phase: 0 } }
          - { texture: "@rod_up",          tag: shaft, transform: { translation: [0, 0.5, 0],    scale: [0.66, 0.75, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
    recipes:
      craft:
        shaped:
          # A stack of two smooth stone slabs + copper on the right, topped by a
          # piston (the press) flanked by two bearings.
          - pattern: ["BPB", " MH", " MC"]
            key:
              B: { block: "mech:bearing" }
              P: { material: PISTON }
              M: { material: SMOOTH_STONE_SLAB }
              C: { material: COPPER_INGOT }
              H: { material: HOPPER }

  # ─── Block Placer ─────────────────────────────────────────────────────────
  # Consumer: 1 Power. WALL only — mounts on a container and places its blocks into
  # the cell in front (the facing direction) when powered, one per cycle. Powered from
  # a shaft on top (Y axis), like the millstone. Vanilla blocks only; skips custom
  # plugin blocks and non-block items. Facing is read from the wall-head block data.
  # Display (placeholder): a scaled dispenser body — the vanilla block-placing machine.
  placer:
    break_on_piston: true
    name: "&aBlock Placer"
    lore:
      - "&7Places blocks from its storage in front when powered"
      - "&7Powered from the top by a shaft"
    catalog_notes:
      - "&fMounts on a wall over a container and places its stored blocks into the space in front of it, one per cycle, while powered by a shaft on top."
      - "&7Vanilla blocks only — it skips custom plugin blocks and anything that isn't a placeable block."
    # Placed head = stone machine head (shared with the millstone/press); item = placer skin.
    texture: "@machine_base"
    item_texture: "@placer_item"
    drops: self
    storage: { layout: HOPPER }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    # Per-wall states orient the dispenser's front face OUTWARD (where it places blocks), like the
    # drill. Placement key = attachment/wall face = getFacing().getOppositeFace(); the dispenser
    # faces the opposite (outward). Only the dispenser's block_data facing differs between states —
    # the shaft (always +Y) and symmetric piston are identical everywhere. Shaft copied from press.
    # The dispenser is a corner-anchored BlockDisplay, so translation -scale/2 recenters the 0.7 cube.
    default_state: idle_n
    placement_state_map: { NORTH: idle_s, SOUTH: idle_n, EAST: idle_w, WEST: idle_e }
    states:
      idle_n:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=north]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_n:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=north]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      idle_s:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=south]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_s:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=south]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      idle_e:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=east]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_e:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=east]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      idle_w:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=west]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
      spinning_w:
        display_entities:
          - { block_data: "minecraft:dispenser[facing=west]", tag: body, transform: { translation: [-0.35, -0.35, -0.35], scale: [0.7, 0.7, 0.7] } }
          - { texture: "@rod_up",        tag: shaft,  transform: { translation: [0, 0.5, 0], scale: [0.66, 0.5, 0.66] }, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
          - { texture: "@placer_piston", tag: piston, transform: { translation: [0, 0, 0],   scale: [0.5, 0.5, 0.5] }, wall_offset: -0.375 }
    recipes:
      craft:
        shaped:
          # Dispenser core (vanilla's block placer) + bearing power intake on top,
          # piston arm below, copper on the sides.
          - pattern: [" BH", "CDC", " P "]
            key:
              B: { block: "mech:bearing" }
              D: { material: DISPENSER }
              C: { material: COPPER_INGOT }
              P: { material: PISTON }
              H: { material: HOPPER }

  # ─── Drill ──────────────────────────────────────────────────────────────
  # Consumer: 1 Power. Breaks the block in its facing direction every 2s.
  drill:
    cancel_pistons: true
    name: "&8Drill"
    lore:
      - "&7Breaks blocks when powered"
      - "&7Mines in facing direction"
    catalog_notes:
      - "&fMounts on a wall and breaks the block directly in front of it while it has power."
      - "&fThe drill face is the wall face you click when placing — it mines away from that wall."
      - "&7Breaking runs in stages (like real mining), so harder blocks take longer to pop."
      - "&cWon't break: obsidian, crying obsidian, spawners, reinforced deepslate, and moving pistons."
    texture: "@drill_head"
    item_texture: "@screw_fwd"
    drops: self
    recipes:
      craft:
        shaped:
          - pattern: [" D ", "INI", "IPI"]
            key:
              D: { material: DIAMOND }
              I: { material: IRON_INGOT }
              N: { material: NETHERITE_INGOT }
              P: { material: PISTON }
    default_state: idle_z
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
    placement_state_map:
      NORTH: idle_z
      SOUTH: idle_south_z
      EAST: idle_east_x
      WEST: idle_x
    states:
      idle_y:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, -0.75, 0], scale: [0.66, 1.0, 0.66] }
      spinning_y: { copy_from: idle_y, animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 } }
      idle_x:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [90, 0, 0, 1] }
      spinning_x: { copy_from: idle_x, animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      idle_east_x:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [-90, 0, 0, 1] }
      spinning_east_x: { copy_from: idle_east_x, animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 } }
      idle_z:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [-90, 1, 0, 0] }
      spinning_z: { copy_from: idle_z, animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }
      idle_south_z:
        display_entities:
          - texture: "@screw_up"
            tag: rod
            transform: { translation: [0, 0, 0], scale: [0.66, 1.0, 0.66], left_rotation: [90, 1, 0, 0] }
      spinning_south_z: { copy_from: idle_south_z, animation: { type: rotate, axis: [0, 0, 1], speed: 3.0 } }

  # ─── Windmill ───────────────────────────────────────────────────────────
  # Source: 1 Power. Always spinning. Regular tier — 0.75 scale, NORMAL banners.
  windmill:
    cancel_pistons: true
    name: "&aWindmill"
    lore:
      - "&7Produces 1 Power"
      - "&7Always spinning"
      - "&7Use Large/Huge banners for a bigger windmill"
    catalog_notes:
      - "&fA passive power source — it spins on its own, with no fuel or redstone needed."
      - "&fThe banner patterns from the four banners you craft it with show up on the blades, so a dyed/patterned banner makes a custom windmill."
