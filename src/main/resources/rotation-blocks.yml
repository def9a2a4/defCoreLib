# Rotation Power System Blocks
# Visual definitions only — Java callbacks added via toBuilder() overlay in RotationBlocks.java.
# Namespace "rotation" so give_demo_rotation can filter by it.
#
# Head model origin: centered in XZ, bottom in Y. Default "face" direction is +Z.
# For wall-axis display entities, left_rotation orients the head to face along the
# rotation axis, and translation centers the scaled model at block center.

