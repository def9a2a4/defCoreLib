  # ─── Redstone Dynamo ────────────────────────────────────────────────────
  # The inverse of the Redstone Motor: reads the rotation network's power and emits an
  # ANALOG 0-15 redstone signal a comparator can read. Physically a real BARREL (its facing
  # encodes the rotation axis) disguised behind an oversized head display; it transmits
  # rotation along its axis like a shaft (draws no power). Right-click opens a mode menu.
  # The barrel is inert: can't be opened, hopper-proof, and drops only the dynamo item.
  # (Behaviour, comparator fill, and menu live in RedstoneDynamo.java.)
  redstone_dynamo:
    name: "&cRedstone Dynamo"
    lore:
      - "&7Emits a redstone signal from"
      - "&7your rotation network's power"
      - "&7Read it with a comparator"
    catalog_notes:
      - "&fMeasures the rotation network it's wired into and emits an analog 0-15 redstone signal — read it with a comparator against any side."
      - "&fRight-click to pick what it reports (total / used / unused power) and how it scales to 0-15 (clamp / mod-15 / ÷15)."
      - "&fTransmits rotation along its axis like a shaft, and draws no power itself."
      - "&7Wrench: show network debug info."
    physical_material: BARREL
    texture: "@dynamo_fwd"
    drops: self
    cancel_pistons: true
    default_state: idle
    states:
      # Single state, single fwd-art skin: one "shell" head display scaled just over a full block to
      # hide the barrel. RedstoneDynamo.orientHead overrides translation/rotation per barrel-facing
      # (front of the art turns to face the barrel's facing; scale here is authoritative).
      # Scale budget: half-extent = 0.25*scale, so slack over the barrel face = 0.25*scale - 0.5.
      # 2.006 -> 0.0015 slack, which must exceed |UP_NUDGE| (RedstoneDynamo) or a face pokes through.
      idle:
        display_entities:
          - texture: "@dynamo_fwd"
            tag: shell
            transform: { translation: [0, 0.501, 0], scale: [2.006, 2.006, 2.006] }
    recipes:
      craft:
        shaped:
          # Copper frame + bearings (rotation coupling) + comparator (signal output).
          - pattern: ["CRC", "BMB", "CRC"]
            key:
              C: { material: COPPER_INGOT }
              R: { material: REDSTONE }
              B: { block: "mech:bearing" }
              M: { material: COMPARATOR }

  # ─── Throttle Lever ───────────────────────────────────────────────────────
  # A hand-set analog redstone SOURCE, disguised as a lever. Physically a real
  # HEAVY_WEIGHTED_PRESSURE_PLATE (iron) placed as a bare block (identity in the chunk PDC, no tile
  # entity): a weighted pressure plate is the only vanilla block whose emitted 0-15 level is settable
  # via AnaloguePowerable block data, so its own `power` carries the signal and drives adjacent
  # redstone directly. A BlockRedstoneEvent override (ThrottleLever.java) pins that output, so it is
  # NOT a working pressure plate — stepping on it can't move the signal, and the player step/click is
  # cancelled. Right-click opens a 0-15 picker (number head-font icons, like the dynamo menu). The
  # spruce-fence "handle" display tilts -45deg (0) .. +45deg (15); a quarter redstone block and two
  # down-facing dispensers dress the base. (All behaviour + the handle angle live in ThrottleLever.java.)
  throttle_lever:
    name: "&cThrottle Lever"
    lore:
      - "&7Emits a redstone signal of a"
      - "&7strength you dial in (0-15)"
    catalog_notes:
      - "&fA set-and-forget analog redstone source: right-click to pick an output strength 0-15."
      - "&fPowers adjacent redstone directly (weighted-plate rules) — run dust/lamps against it."
      - "&7Ignores footsteps: stepping on it will not change the signal."
    base_block: HEAVY_WEIGHTED_PRESSURE_PLATE
    texture: "@throttle_lever"          # in-hand item icon (placeholder)
    drops: self
    default_state: idle
    placement:
      allowed_faces: [DOWN]             # floor placement only (needs solid support below)
    states:
      idle:
        # All visuals are BlockDisplay entities (block_data:), so the flat iron plate underneath is
        # dressed over. Transforms below are the level-0 rest pose / static dressing — visual tuning
        # knobs. ThrottleLever.java overrides the "handle" transform per output level to tilt it.
        # Display origin is the block CENTRE (DisplayUtil.spawnBlock), so translations are relative to
        # centre: floor = y -0.5, and X/Z centred = -scale/2.
        display_entities:
          # Handle — spruce fence, 2x smaller (scale 0.5), upright, base lifted 0.2 above floor centre.
          # This is only the level-0 rest pose; ThrottleLever.java tilts it about X per output level
          # (tip swings in ±Z) and pins the base to the same lifted point.
          - block_data: "minecraft:spruce_fence"
            tag: handle
            transform: { translation: [-0.25, -0.3, -0.25], scale: [0.5, 0.5, 0.5] }
          # One redstone block + one dispenser, same size, flush with the floor, just touching at z=0
          # (the redstone block sits on the +Z swing end, the dispenser on the -Z end).
          - block_data: "minecraft:redstone_block"
            tag: rblock
            transform: { translation: [-0.125, -0.5, 0.0], scale: [0.25, 0.25, 0.25] }
          - block_data: "minecraft:dispenser[facing=down]"
            tag: dispenser
            transform: { translation: [-0.125, -0.5, -0.25], scale: [0.25, 0.25, 0.25] }
    recipes:
      craft:
        shaped:
          # Lever (control) over an iron weighted plate (the analog body) over a redstone block (source).
          - pattern: ["L", "P", "R"]
            key:
              L: { material: LEVER }
              P: { material: HEAVY_WEIGHTED_PRESSURE_PLATE }
              R: { material: REDSTONE_BLOCK }

  # ─── Mechanical Casing ────────────────────────────────────────────────────
  # A block that auto-glues to adjacent blocks like a vanilla slime block: any casing in a moving
  # contraption drags its cardinal neighbours (transitively through other casings). Slime propagation
  # lives in CasingExpansion, hooked into every mover (piston / rotator / door / minecart / chain
  # hoist). Movable by mechanisms; ordinary to drill/break. No Java overlay — pure data.
  #
  # Under the hood each variant is a real upside-down `<wood>_STAIRS` bare block — identity in the
  # display-backed bare-block registry (durable chunk PDC + the tagged shell display), not a
  # block-entity PDC. Stairs rather than planks because a stair does NOT occlude, and a display entity
  # samples light at its own cell: inside an opaque plank the shell rendered pitch black. (The dynamo
  # hits the same wall and buys out with setBrightness(15,15) — fine for one machine block, a glowing
  # wall for something you place by the hundred.) The price is a 3/4 collider and a casing wall that
  # casts no shade: "blocks light" and "a display inside it is lit" are the same property, so you
  # cannot have both. base_block_data pins every copy to the same upside-down straight stair; see
  # BASE_DATA in scripts/oneoff/gen_casings.py.
  casing_oak:
    name: "&fOak Mechanical Casing"
    lore:
      - "&7Bonds to other casings, forming a"
      - "&7frame any mechanism can move"
    catalog_notes:
      - "&fBonds to adjacent casings (any wood mixes), forming a rigid frame — build a moving contraption without the glue brush."
      - "&7Casings never grab other blocks. Attach machinery and decoration with slime or honey blocks (which grab everything except each other), or the glue brush."
      - "&7A vanilla piston moves a lone casing as an ordinary block (no spread)."
      - "&7Comes in every plank wood — the center plank of the recipe picks the variant."
    base_block: OAK_STAIRS
    base_block_data: "[half=top,facing=north,shape=straight,waterlogged=false]"
    texture: "@casing_oak"
    drops: self
    default_state: idle
    states:
      idle:
        display_entities:
          - texture: "@casing_oak"
            tag: shell
            # The redstone dynamo's placement verbatim, and for the same reason: cover the block
            # you are disguising. Half-extent = 0.25*scale = 0.5015, so 0.0015 of slack over the
            # stair's face; the head model's visual centre sits HEAD_CENTER (-0.25) model-units
            # below the transform origin, so it lands at 0.501 - 0.5015 = -0.0005 = the dynamo's
            # UP_NUDGE, i.e. block centre. (RedstoneDynamo.orientHead computes exactly this T for
            # identity rotation — it only differs from the yml when a barrel-facing rotates it.)
            # Depends on make_cased.py baking the frame into the BASE layer and leaving the hat
            # empty: a hat is inflated 17/16, so it would render at 0.5328 here and double every
            # seam on a wall. Restoring a hat layer means going back to 1.888 (= 2.006 × 16/17).
            transform: { translation: [0, 0.501, 0], scale: [2.006, 2.006, 2.006] }
    recipes:
      craft:
        shaped:
          - pattern: ["N N", " P ", "N N"]   # X: iron-nugget corners, plank center (edges empty)
            key:
              N: { material: IRON_NUGGET }
              P: { material: OAK_PLANKS }

