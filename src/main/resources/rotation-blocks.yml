  # ─── Fan ────────────────────────────────────────────────────────────────
  # Consumer: 1 Power. Spins only while powered; blows entities (mobs, players,
  # dropped items) away from the surface it's mounted on — floor → up, wall →
  # outward — in a ~1-wide beam. Push strength scales with surplus power; reach is
  # fixed (see rotation-config.yml fan.range). Blade geometry mirrors the regular
  # windmill (0.75 scale); states are idle_/spinning_ pairs so the network can
  # start/stop the spin by swapping the prefix while keeping orientation.
  fan:
    cancel_pistons: true
    name: "&fFan"
    lore:
      - "&7Consumes rotation power to blow entities"
      - "&7Pushes mobs, players & items away from its mount"
      - "&7Stronger with more surplus power; fixed range"
    catalog_notes:
      - "&fBlows a straight beam of wind out of its face, pushing mobs, players, and dropped items along it."
      - "&fPlace it on the floor to blow things upward, or on a wall to blow them outward."
      - "&7Reaches a fixed distance (about 5 blocks); it does not push farther with more power."
      - "&7Extra surplus power on the network makes the push stronger, up to a cap — it doesn't extend the range."
    texture: "@fan_placed_fwd"
    item_texture: "@fan_item"
    drops: self
    break_sound: { sound: BLOCK_WOOD_BREAK, volume: 0.8, pitch: 1.2 }
    place_sound: { sound: BLOCK_WOOD_PLACE, volume: 0.8, pitch: 1.2 }
    default_state: idle_floor
    placement_state_map:
      DOWN: idle_floor
      NORTH: idle_wall_s
      SOUTH: idle_wall_n
      EAST: idle_wall_e
      WEST: idle_wall_w
    states:
