# Rotation Power System Blocks
# Visual definitions only — Java callbacks added via toBuilder() overlay in RotationBlocks.java.
# Namespace "rotation" so give_demo_rotation can filter by it.
#
# Head model origin: centered in XZ, bottom in Y. Default "face" direction is +Z.
# For wall-axis display entities, left_rotation orients the head to face along the
# rotation axis, and translation centers the scaled model at block center.

namespace: rotation

# ── Textures ──────────────────────────────────────────────────────────────────
# Shaft head & display: Cut Copper (e28bc2df)
# Gear item:            Copper Gear (1e5edfe9)
# Gear placed head:     Iron Block (7ff9817d)
# Gear display:         Copper Gear modified (53548c6b)
# Gearbox:              Copper Block (1c265803)

blocks:

  # ─── Shaft ──────────────────────────────────────────────────────────────
  # Transmitter: passes rotation power along its axis.
  # Display: Cut Copper head, 2x length along axis, 0.66x width.
  shaft:
    name: "&eShaft"
    lore:
      - "&7Transmits rotational power"
    # Cut Copper
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZTI4YmMyZGYzZGZmNWVjM2QxNDNhMmNlZWNiOTM4MjE4MzUxNmU5ZmFkZDdlNDA5YTVlYjQxNTUxNTc0YTI1ZiJ9fX0="
    drops: self
    default_state: idle_y
    placement_state_map:
      DOWN: idle_y
      NORTH: idle_z
      SOUTH: idle_z
      EAST: idle_x
      WEST: idle_x
    states:
      # Y-axis: default head orientation
      idle_y:
        display_entities:
          - texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZTI4YmMyZGYzZGZmNWVjM2QxNDNhMmNlZWNiOTM4MjE4MzUxNmU5ZmFkZDdlNDA5YTVlYjQxNTUxNTc0YTI1ZiJ9fX0="
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 2.0, 0.66] }
      spinning_y:
        display_entities:
          - texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZTI4YmMyZGYzZGZmNWVjM2QxNDNhMmNlZWNiOTM4MjE4MzUxNmU5ZmFkZDdlNDA5YTVlYjQxNTUxNTc0YTI1ZiJ9fX0="
            tag: rod
            transform: { translation: [0, 0.5, 0], scale: [0.66, 2.0, 0.66] }
            animation: { type: rotate, axis: [0, 1, 0], speed: 3.0 }
            interpolation: 2
      # X-axis: rotate head 90° around Z so height→-X
      idle_x:
        display_entities:
          - texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZTI4YmMyZGYzZGZmNWVjM2QxNDNhMmNlZWNiOTM4MjE4MzUxNmU5ZmFkZDdlNDA5YTVlYjQxNTUxNTc0YTI1ZiJ9fX0="
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.0, 0.66], left_rotation: [90, 0, 0, 1] }
      spinning_x:
        display_entities:
          - texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZTI4YmMyZGYzZGZmNWVjM2QxNDNhMmNlZWNiOTM4MjE4MzUxNmU5ZmFkZDdlNDA5YTVlYjQxNTUxNTc0YTI1ZiJ9fX0="
            tag: rod
            transform: { translation: [-0.5, 0, 0], scale: [0.66, 2.0, 0.66], left_rotation: [90, 0, 0, 1] }
            animation: { type: rotate, axis: [1, 0, 0], speed: 3.0 }
            interpolation: 2
      # Z-axis: rotate head -90° around X so height→Z
      idle_z:
        display_entities:
          - texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZTI4YmMyZGYzZGZmNWVjM2QxNDNhMmNlZWNiOTM4MjE4MzUxNmU5ZmFkZDdlNDA5YTVlYjQxNTUxNTc0YTI1ZiJ9fX0="
            tag: rod
            transform: { translation: [0, 0, -0.5], scale: [0.66, 2.0, 0.66], left_rotation: [-90, 1, 0, 0] }
