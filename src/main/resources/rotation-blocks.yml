          - { material: WHITE_BANNER, tag: blade_b, transform: { translation: [0, 0.1875, 0],  scale: [0.375, 0.375, 0.375] }, wall_offset: -0.001 }
          - { material: WHITE_BANNER, tag: blade_c, transform: { translation: [-0.1875, 0, 0], scale: [0.375, 0.375, 0.375], left_rotation: [90, 0, 0, 1] }, wall_offset: -0.001 }
          - { material: WHITE_BANNER, tag: blade_d, transform: { translation: [0, -0.1875, 0], scale: [0.375, 0.375, 0.375], left_rotation: [180, 0, 0, 1] }, wall_offset: -0.001 }
      spinning_wall_n: { copy_from: idle_wall_n, texture: "@fan_placed_fwd", animation: { type: rotate, axis: [0, 0, 1], speed: 6.0 } }
      idle_wall_s:
        texture: "@fan_placed_fwd"
        display_entities:
          - { material: WHITE_BANNER, tag: blade_a, transform: { translation: [0.1875, 0, 0],  scale: [0.375, 0.375, 0.375], left_rotation: [180, 1, 1, 0] }, wall_offset: -0.001 }
