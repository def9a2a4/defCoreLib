# ── Small solid shapes ──
lightning_rod:
  size: 0.1
chest:
  size: 0.9
trapped_chest:
  size: 0.9
"*copper_chest":
  size: 0.9
"*copper_grate":
  size: 0.5

# ── Heads & skulls: half-size box (dragon = full block). Wall variants get the runtime wall shift. ──
player_head: {size: 0.5}
player_wall_head: {size: 0.5}
zombie_head: {size: 0.5}
zombie_wall_head: {size: 0.5}
skeleton_skull: {size: 0.5}
skeleton_wall_skull: {size: 0.5}
wither_skeleton_skull: {size: 0.5}
wither_skeleton_wall_skull: {size: 0.5}
creeper_head: {size: 0.5}
creeper_wall_head: {size: 0.5}
piglin_head: {size: 0.5}
piglin_wall_head: {size: 0.5}
dragon_head: true
dragon_wall_head: true
