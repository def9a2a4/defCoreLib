# Blocks that can be picked up by the minecart ship scanner.
# Supports three wildcard forms:
#   "OAK_*"     — prefix: matches OAK_PLANKS, OAK_STAIRS, etc.
#   "*_GLASS"   — suffix: matches RED_STAINED_GLASS, etc.
#   "*COPPER*"  — contains: matches CUT_COPPER, WAXED_CUT_COPPER_STAIRS, etc.
# Only block materials are accepted; items are ignored.
# Entries matching 0 blocks log a warning on startup.

allowed_blocks:
  # Structural wood (all variants via suffix wildcards — avoids buttons/signs/saplings/leaves)
  - "*_PLANKS"
  - "*_LOG"
  - "*_WOOD"
  - "*_STAIRS"
  - "*_SLAB"
  - "*_FENCE"
  - "*_FENCE_GATE"
  - "*_TRAPDOOR"
  - "*_DOOR"
  - "STRIPPED_*"

  # Stone variants
  - "STONE"
  - "STONE_BRICKS"
  - "STONE_BRICK_*"
  - "COBBLESTONE"
  - "COBBLESTONE_*"
  - "SMOOTH_STONE"
  - "SMOOTH_STONE_SLAB"
  - "MOSSY_*"
  - "DEEPSLATE"
  - "COBBLED_DEEPSLATE"
  - "COBBLED_DEEPSLATE_*"
  - "POLISHED_DEEPSLATE"
  - "POLISHED_DEEPSLATE_*"
