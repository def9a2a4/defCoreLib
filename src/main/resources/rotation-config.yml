max-network-size: 256
# Max blocks a mechanism structure (door / drawbridge / minecart) can grab.
# Hitting the cap logs a warning + shows smoke at the anchor (no longer silent).
max-structure-size: 256

# "Glue": author-controlled block selection for doors/rotators (replaces same-material flood-fill).
glue:
  max-size: 256           # cap on a glued selection (defaults to max-structure-size if omitted)
  # The glue item itself is declared in corelib-items.yml (corelib:glue_item, SLIME_BALL).
  outline-interval: 5     # ticks between particle-outline refreshes during authoring
  session-timeout: 2400   # ticks of inactivity before an authoring session auto-closes

drill:
  tick-interval: 4
  break-stages: 10
  blacklist:
    - OBSIDIAN
    - CRYING_OBSIDIAN
    - SPAWNER
    - MOVING_PISTON
    - REINFORCED_DEEPSLATE

millstone:
  tick-interval: 20   # fixed grind cycle length, in ticks
  max-batch: 8        # cap on items ground per cycle (batch scales with surplus power)

fan:
  tick-interval: 2    # ticks between pushes (frequent = continuous force)
  range: 5            # fixed beam length, in blocks
  min-push: 0.12      # per-tick push velocity when powered with no surplus power
  max-push: 0.5       # cap on per-tick push velocity
  push-per-power: 0.08 # extra push velocity per surplus power

press:
  tick-interval: 20   # fixed press cycle length, in ticks
  max-batch: 8        # cap on items pressed per cycle (batch scales with surplus power)

placer:
  tick-interval: 20   # ticks between placements (one block placed per cycle)

chain-pulley:
  max-distance: 32    # max distance (blocks) between two linked chain pulleys

fuel:
  COAL: 16
  CHARCOAL: 12
  COAL_BLOCK: 144    # 16 * 9
  LAVA_BUCKET: 100
  BLAZE_ROD: 20
  STICK: 1
  # Also: all *_LOG/*_WOOD/*_STEM/*_HYPHAE → 8, all *_PLANKS → 3
  # (registered dynamically via Material.values() scan)

power:
  windmill: 1
  large_windmill: 5
  huge_windmill: 15
  water_wheel: 2
  engine: 5
  redstone_motor: 1
  drill: 1
  millstone: 1
  fan: 1
  press: 1
  placer: 1
