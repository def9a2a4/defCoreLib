max-network-size: 256
# Max blocks a mechanism structure (door / drawbridge / minecart) can grab.
# Hitting the cap logs a warning + shows smoke at the anchor (no longer silent).
max-structure-size: 256

# "Glue": author-controlled block selection for doors/rotators (replaces same-material flood-fill).
glue:
  max-size: 256           # cap on a glued selection (defaults to max-structure-size if omitted)
  # The glue item itself is declared in corelib-items.yml (corelib:glue_item, SLIME_BALL).
  outline-interval: 5     # ticks between particle-outline refreshes during authoring
  session-timeout: 2400   # ticks of inactivity before an authoring session auto-closes

drill:
  tick-interval: 4
  break-stages: 10
  blacklist:
    - BEDROCK
    - SPAWNER
    - MOVING_PISTON
    - REINFORCED_DEEPSLATE

millstone:
  tick-interval: 20   # fixed grind cycle length, in ticks
  max-batch: 8        # cap on items ground per cycle (batch scales with surplus power)

fan:
  tick-interval: 2    # ticks between pushes (frequent = continuous force)
  range: 5            # fixed beam length, in blocks
  min-push: 0.12      # per-tick push velocity when powered with no surplus power
  max-push: 0.5       # cap on per-tick push velocity
  push-per-power: 0.08 # extra push velocity per surplus power

powered-dispenser:
  power-cap: 10         # network power above this adds no more boost ("over 10 does nothing")
  min-boost: 0.4        # extra launch velocity (blocks/tick) at minimum power
  boost-per-power: 0.2  # extra launch velocity per unit of network power (reaches max-boost near 10)
  max-boost: 2.0        # cap for arrows/items (arrow ~1.1 b/t base -> ~3.1 b/t at max power)
  tnt-max-boost: 1.5    # separate cap for thrown primed TNT (forward throw)
  min-straightness: 0.8 # spread reduction at minimum power (1.0 = perfectly straight; dead straight at cap)

press:
  tick-interval: 20   # fixed press cycle length, in ticks
  max-batch: 8        # cap on items pressed per cycle (batch scales with surplus power)

sieve:
  tick-interval: 40   # fixed panning cycle length, in ticks (slower than mill/press on purpose)
  max-batch: 1        # one item panned per cycle — surplus power does not speed it up
  tank-units: 4       # water tank capacity, in buckets (pipe-fillable or bucket right-click)
  water-per-cycles: 16 # pans per bucket of water; a dry sieve idles

pump:
  tick-interval: 40   # ticks per pump cycle (one whole-bucket unit moved per cycle)
  # Body-top raise when a horizontal corner pipe sits above: top goes 1.0015 → 1.2 (rel.
  # pump floor), where a vertical pipe under a corner ends (pipes display.yml
  # corner-pipe.up: -0.3; elbow bottom at 1.225). Re-derive if pipes re-tunes those.
  stretch-to-corner: 0.1985

steam:
  boiler-tank-units: 8      # boiler water tank capacity, in buckets
  water-interval-ticks: 1200 # running time per boiler water unit (~60 s)

placer:
  tick-interval: 20   # ticks between placements (one block placed per cycle)

chain-pulley:
  max-distance: 32    # max distance (blocks) between two linked chain pulleys

piston:
  max-step: 0.25      # extendable piston (+ chain hoist) cap on per-tick slide velocity (blocks/tick)

redstone_dynamo:
  tick-interval: 10       # ticks between comparator-output refreshes
  default-mode: TOTAL     # TOTAL | USED | UNUSED — which network quantity to report
  default-scaling: CLAMP  # CLAMP | MOD15 | DIV15 — how to map the value into a 0-15 signal

fuel:
  COAL: 16
  CHARCOAL: 12
  COAL_BLOCK: 144    # 16 * 9
  LAVA_BUCKET: 100
  BLAZE_ROD: 20
  STICK: 1
  # Also: all *_LOG/*_WOOD/*_STEM/*_HYPHAE → 8, all *_PLANKS → 3
  # (registered dynamically via Material.values() scan)

power:
  windmill: 1
  large_windmill: 5
  huge_windmill: 15
  water_wheel: 2
  engine: 10
  steam_piston: 20
  redstone_motor: 1
  drill: 5
  millstone: 5
  fan: 2
  press: 4
  sieve: 10
  pump: 4
  placer: 2
  suction_hopper: 3
  powered_dispenser: 1   # light constant demand — any powered network (supply >= 1) activates the launcher
  piston_core: 1   # base rotational demand of an extendable piston core (speed scales with surplus above this)
  chain_hoist: 1   # base rotational demand of a chain hoist (lift speed scales with surplus above this)

# How each rotation block behaves while assembled into a moving mechanism (minecart, door,
# drawbridge). Its supply/demand comes from the `power:` map above — not repeated here.
#   kind:      transmitter — passes power along
#              consumer    — draws power and works at its live world position
#              engine      — supplies while burning fuel from its own travelling inventory
#              constant_source — always supplies while assembled
#              none        — remove a built-in entry (block ignored on mechanisms)
#   axis:      state (default) — spin axis parsed from the captured state name
#              y      — always driven from a shaft on top
#              facing — spin axis follows the block's facing
#              omni   — draws from the first aligned neighbor on any non-mounted face
#   gear_like: meshes with adjacent gears (counter-rotation, bevels)
# Notes: world redstone can't reach a block riding a mechanism, so the reverser/clutch pass
# through unlocked, and the (inverted) redstone motor runs as a constant source. The water
# wheel can't check for water while moving, so it only transmits.
mechanism:
  shaft:           { kind: transmitter }
  gear:            { kind: transmitter, gear_like: true }
  reverser:        { kind: transmitter }
  clutch:          { kind: transmitter }
  chain_pulley:    { kind: transmitter }
  redstone_dynamo: { kind: transmitter }
  water_wheel:     { kind: transmitter }
  engine:          { kind: engine }
  redstone_motor:  { kind: constant_source }
  windmill:        { kind: constant_source }
  large_windmill:  { kind: constant_source }
  huge_windmill:   { kind: constant_source }
  drill:           { kind: consumer }
  millstone:       { kind: consumer, axis: y }
  press:           { kind: consumer, axis: y }
  sieve:           { kind: consumer, axis: y }
  placer:          { kind: consumer, axis: y }
  fan:             { kind: consumer, axis: facing }
  suction_hopper:  { kind: consumer, axis: omni }
