max-network-size: 256
# Max blocks a mechanism structure (door / drawbridge / minecart) can grab.
# Hitting the cap logs a warning + shows smoke at the anchor (no longer silent).
max-structure-size: 256

drill:
  tick-interval: 4
  break-stages: 10
  blacklist:
    - OBSIDIAN
    - CRYING_OBSIDIAN
    - SPAWNER
    - MOVING_PISTON
    - REINFORCED_DEEPSLATE

grindstone:
  tick-interval: 20   # fixed grind cycle length, in ticks
  max-batch: 8        # cap on items ground per cycle (batch scales with surplus SU)

fan:
  tick-interval: 2    # ticks between pushes (frequent = continuous force)
  range: 5            # fixed beam length, in blocks
  min-push: 0.12      # per-tick push velocity when powered with no surplus SU
  max-push: 0.5       # cap on per-tick push velocity
  push-per-su: 0.08   # extra push velocity per surplus SU

fuel:
  COAL: 200
  CHARCOAL: 160
  COAL_BLOCK: 1600
  LAVA_BUCKET: 2000
  BLAZE_ROD: 300
  STICK: 25
  # Also: all *_LOG/*_WOOD/*_STEM/*_HYPHAE → 150, all *_PLANKS → 75
  # (registered dynamically via Material.values() scan)

power:
  windmill: 1
  large_windmill: 5
  huge_windmill: 15
  water_wheel: 2
  engine: 5
  generator: 1
  drill: 1
  grindstone: 1
  fan: 1
