# Inventory-only custom items in the `mech` namespace (non-placeable).
# Same model as custom-items.yml: a CustomHeadBlock with item_material + placeable:false,
# so they reuse createItem / give / docs with no parallel item system. Behavior is wired
# in Java by id (e.g. GlueItem.isGlueItem checks the block_type PDC == corelib:glue_item).
namespace: mech
blocks:
  # Glue Brush: authoring tool for door/rotator structures. Given via /defcorelib give glue.
  # A real BRUSH (kept damageable) — GlueAuthoring suppresses vanilla brushing and wears it
  # down one durability per glued block.
  glue_item:
    name: "&aGlue Brush"
    lore:
      - "&7Right-click a door/rotator hinge to edit"
      - "&7Left-click: glue  ·  Shift-left-click: unglue"
      - "&7Right-click two blocks: cuboid fill"
      - "&7Right-click air: reset corner  ·  Sneak-right hinge: clear"
      - "&8Wears out as you glue"
    catalog_notes:
      - "&fThe authoring tool for moving structures: use it to pick exactly which blocks a [Rotator](mech:rotator) or [Mechanical Minecart](mech:mechanism_minecart) carries."
      - "&7Glue a selection to a hinge or cart and it moves those blocks as one; see the controls above."
      - "&8It's a real brush and wears down one durability per block you glue."
    item_material: BRUSH
    placeable: false
    item_glint: true
    recipe_category: REDSTONE
    recipes:
      craft:
        shapeless:
          - ingredients:
              - { material: BRUSH }
              - { material: SLIME_BALL }
