blocks:
  coal_cart:
    name: "&6Coal Minecart"
    lore:
      - "&7Right-click a rail to spawn a fuel tender."
      - "&7Feeds furnace & blast-furnace carts in its train."
      - "&7Accepts only fuel; hoppers above/beside fill it."
    catalog_notes:
      - "&fRight-click a rail to spawn a coal tender: a minecart with a 9-slot, fuel-only inventory rendered as a block of coal."
      - "&fCouple it into a train and it automatically feeds any furnace or blast-furnace cart in that train."
      - "&7Hoppers above or beside the track can refill it as it passes."
    texture: "@minecart-coal"
    item_glint: true
    placeable: false
    storage: { layout: DROPPER }
    recipes:
      craft:
        shapeless:
          - ingredients:
              - { material: COAL_BLOCK }
              - { material: MINECART }
              - { material: DROPPER }

  blast_furnace_cart:
    name: "&cBlast Furnace Minecart"
    lore:
      - "&7Right-click a rail to spawn a fast locomotive."
      - "&7A furnace cart with a fuel-only inventory,"
      - "&7much higher top speed."
    catalog_notes:
      - "&fRight-click a rail to spawn a blast-furnace locomotive: like a furnace minecart, but with a 5-slot, fuel-only inventory and a far higher configurable top speed."
      - "&fPowers a whole train from anywhere in the consist."
    texture: "@minecart-blast-furnace"
    item_glint: true
    placeable: false
    storage: { layout: HOPPER }
    recipes:
      craft:
        shapeless:
          - ingredients:
              - { material: BLAST_FURNACE }
              - { material: MINECART }

  dispenser_cart:
    name: "&bDispenser Minecart"
    lore:
      - "&7Right-click a rail to spawn a dispenser cart."
      - "&7Holds any items in a 9-slot inventory."
      - "&7Fires one item upward each time it rolls"
      - "&7over a powered activator rail."
    catalog_notes:
      - "&fRight-click a rail to spawn a dispenser minecart: a 3×3 inventory that launches one item straight up every time it crosses a powered activator rail."
      - "&7Hoppers above/beside the track load it; unlike the fuel carts it accepts any item."
    texture: "@minecart-dispenser"
    item_glint: true
    placeable: false
    storage: { layout: DROPPER }
    recipes:
      craft:
        shapeless:
          - ingredients:
              - { material: DISPENSER }
              - { material: MINECART }

  # ── Rails ──────────────────────────────────────────────────────────────────
  # Placed as real rails (base_block); identity + persistence come from CoreLib's bare-block chunk index,
  # behaviour from CartRailsManager. The item + a world display-entity "shell" both use a custom head skin
  # (the vanilla rail underneath stays plain). The shell transform is a tune knob — see the note below.

  junction:
    name: "&eMinecart Junction"
    lore:
      - "&7A crossing rail: a cart passing over it keeps"
      - "&7its heading and goes straight instead of curving."
    catalog_notes:
      - "&fPlace where two straight tracks cross. A cart crossing it continues straight in the direction it was already travelling, so north–south and east–west lines can intersect without turning carts."
    base_block: RAIL
    texture: "@rail-junction"
    item_glint: true
    drops: self
    # Head shell over the rail. translation is from block-centre (DisplayUtil adds 0.5). X/Z are 1/17
    # narrower than Y (1.999×16/17) to shed the head's hat inflation; translation.y is a tune knob.
    default_state: idle
    states:
      idle:
        display_entities:
          - texture: "@rail-junction"
            tag: shell
            transform: { translation: [0, -0.4275, 0], scale: [1.88141, 0.9995, 1.88141] }
    recipes:
      craft:
        shaped:
          - amount: 2
            pattern:
              - " R "
              - "RIR"
              - " R "
            key:
              R: { material: RAIL }
              I: { material: IRON_INGOT }

  destructor_rail:
    name: "&cDestructor Rail"
    lore:
      - "&7Destroys any minecart that passes over it,"
      - "&7depositing the cart item and its contents into"
      - "&7the container directly below (else on the ground)."
      - "&7Mechanical minecarts pass over unharmed."
    catalog_notes:
      - "&fA detector rail that recycles a passing minecart: it ejects any riders, then drops the cart item, everything in its inventory, and any coupling chains into the barrel / dropper / dispenser directly below — or onto the ground if there is no container."
      - "&7Mechanical minecarts are exempt and pass over unharmed."
    base_block: DETECTOR_RAIL
    texture: "@rail-destructor"
    item_glint: true
    drops: self
    default_state: idle
    states:
      idle:
        display_entities:
          - texture: "@rail-destructor"
            tag: shell
            transform: { translation: [0, -0.4275, 0], scale: [1.88141, 0.9995, 1.88141] }
    recipes:
      craft:
        shapeless:
          - ingredients:
              - { material: DETECTOR_RAIL }
              - { material: POINTED_DRIPSTONE }
              - { material: HOPPER }

  controller_rail:
    name: "&aController Rail"
    lore:
      - "&7Sets the target speed of a fueled blast-furnace"
      - "&7cart passing over it, from its redstone signal:"
      - "&7full power = top speed, weaker = slower."
      - "&7No effect on trains without a lit blast cart."
    catalog_notes:
      - "&fA rail that sets the cruise speed of a passing blast-furnace locomotive by its redstone signal strength: 0 → stop, 15 → full speed, linear between. The train accelerates or brakes toward that target and holds it even after leaving the rail — place another controller to set a new one."
      - "&7Build a RUN of these — braking is gradual (~13 blocks to stop from full), so a single rail barely changes speed; a zone of unpowered controllers makes a stop-and-hold station that departs when re-powered."
      - "&7Only affects a train that has a lit (fueled) blast-furnace cart."
    base_block: RAIL
    texture: "@rail-controller"
    item_glint: true
    drops: self
    default_state: idle
    states:
      idle:
        display_entities:
          - texture: "@rail-controller"
            tag: shell
            transform: { translation: [0, -0.4275, 0], scale: [1.88141, 0.9995, 1.88141] }
    recipes:
      craft:
        shaped:
          - amount: 2
            pattern:
              - " C "
              - "ODO"
              - " R "
            key:
              C: { material: COMPARATOR }
              O: { material: COPPER_INGOT }
              D: { material: DETECTOR_RAIL }
              R: { material: REDSTONE }
