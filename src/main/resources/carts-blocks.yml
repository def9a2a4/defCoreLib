  minecart-blast-furnace:   "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYTAxYTg3NWNmMDc2OTFlNzNhZTRlOWViNGJkZDdiMTI5MjQzY2YxNDUyN2RlNDY0ZDU3MTM2YjU4NTk5NDk2MiJ9fX0="  # cart-blast-furnace — blast-cart in-hand item
  rail-junction:            "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvY2M5NmU4Y2QyOWJjNWQwMjQ4ZDMzMzhlMDBjZmY1NWVlYzFiOGQ4MDY2MjA4Y2Y0YTk0YWRmOGQ2NzFkN2Y2OSJ9fX0="  # rail-junction — junction item + world shell
  rail-destructor:          "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjE0ODkzZjVlOGNlNmIzZmQ5OGY5MWJmYzM1MGE5NWRiNTIzY2VlOTMzOGI1ZjNmNDY3OGZiOTQ3ZGU1MTk3ZCJ9fX0="  # rail-destructor — destructor item + world shell
