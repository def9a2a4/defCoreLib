# Demo "showcases": multi-block machines that demonstrate plugin functionality.
# Placed as real, network-joined blocks. `at` is [dx,dy,dz] from the build origin; `facing` is the
# placement (clicked) face — the block's head then points the OPPOSITE way (a wall head faces away
# from the surface it hangs on). This matters for DIRECTIONAL blocks (drill bore, fan blow, grindstone
# wall side): write the clicked face, not the direction you want it to point.
# KEY RULE (verified in RotationNetwork): a block connects only to the two neighbours
# ALONG ITS SPIN AXIS — facing down → Y axis (couples up/down); north/south → Z (couples N/S); east/west
# → X (couples E/W). So a power chain must run *along* the shared axis.
#   • grindstone is always Y-axis (wall-mounted, powered from directly above/below) regardless of facing.
#   • drill/fan take their axis from facing.
#   • generator is a PASSIVE source (spins by default; redstone DISABLES it) — never pulse it.
#   • engine only produces power once FUELLED (the runner feeds it); idle/static until then.
#   • reverser only flips direction when it is itself redstone-powered.
#
# `activate`: passive | { fuel: [x,y,z] } | { pulse: [x,y,z] }.  `expect`: phase-2 assertions.
showcases:
  # ── Engine-powered (fuel source; static until the runner fuels them) ────
  - id: engine_fan
    name: "Engine → Fan"
    blurb: "A fuel-burning engine spins a shaft up into a fan that blows a gust of air."
    blocks:
      - { id: "rotation:engine", facing: down, at: [0, 0, 0] }   # Y axis (couples up)
      - { id: "rotation:shaft",  facing: down, at: [0, 1, 0] }
      - { id: "rotation:fan",    facing: down, at: [0, 2, 0] }   # floor fan = Y axis
    activate: { fuel: [0, 0, 0] }
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 2, 0] }

  - id: engine_grindstone
    name: "Engine → Grindstone"
    blurb: "A fuel-burning engine drives a vertical shaft down into a grindstone that mills items."
    blocks:
      # Grindstone is Y-axis (powered from above), so the whole chain is a vertical Y column.
      - { id: "rotation:engine",     facing: down,  at: [0, 2, 0] }
      - { id: "rotation:shaft",      facing: down,  at: [0, 1, 0] }
      # `facing` is the clicked face → the head points the OPPOSITE way, so `south` backs the
      # grindstone onto the STONE at +z below. (Axis is hardcoded Y regardless of facing.)
      - { id: "rotation:grindstone", facing: south, at: [0, 0, 0] }
    vanilla:
      - { block: "STONE", at: [0, 0, 1] }   # wall the grindstone mounts against (south support)
    activate: { fuel: [0, 2, 0] }
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 0, 0] }

  # ── Generator-powered (passive: spins by default — do NOT pulse it) ─────
  - id: generator_drill
    name: "Generator → Drill"
    blurb: "A redstone generator powers a drill that bores forward through solid stone."
    blocks:
      # Horizontal Z column (all Z axis, coupled along N/S). `facing` is the clicked face → the head
      # points the OPPOSITE way, so the drill is `south` to bore NORTH (−z) into the stone — NOT into
      # its own shaft on the +z side. Generator/shaft direction is irrelevant (Z axis either way).
      - { id: "rotation:generator", facing: north, at: [0, 0, 2] }
      - { id: "rotation:shaft",     facing: north, at: [0, 0, 1] }
      - { id: "rotation:drill",     facing: south, at: [0, 0, 0] }   # bores north (−z) into the stone
    vanilla:
      - { block: "STONE", at: [0, 0, -1] }   # the block the drill chews
    activate: passive
    expect:
      - { type: network_powered, at: [0, 0, 1] }
      - { type: spinning, at: [0, 0, 0] }

  - id: generator_reverser_fan
    name: "Generator → Reverser → Fan"
    blurb: "A redstone generator drives a fan, but a powered reverser flips the spin direction first."
    blocks:
      - { id: "rotation:generator", facing: down, at: [0, 0, 0] }
      - { id: "rotation:reverser",  facing: down, at: [0, 1, 0] }   # reverses (redstone block beside it)
      - { id: "rotation:shaft",     facing: down, at: [0, 2, 0] }
      - { id: "rotation:fan",       facing: down, at: [0, 3, 0] }
    vanilla:
      - { block: "REDSTONE_BLOCK", at: [1, 1, 0] }   # powers the reverser → flips direction
    activate: passive
    expect:
      - { type: network_powered, at: [0, 2, 0] }
      - { type: spinning, at: [0, 3, 0] }

  - id: generator_drawbridge
    name: "Generator → Drawbridge"
    blurb: "A redstone generator powers a rotator hinge; a pulse swings the plank drawbridge open."
    blocks:
      # Generator sits BEHIND the hinge on the Z axis (couples N/S); the trigger is on the far side so
      # it can't disable the generator.
      - { id: "rotation:generator", facing: north, at: [0, 0, -1] }
      - { id: "rotation:rotator",   facing: north, at: [0, 0, 0] }   # hinge, Z axis
    vanilla:
      - { block: "OAK_PLANKS", at: [0, 1, 0] }   # drawbridge leaf (flood-filled by the hinge)
      - { block: "OAK_PLANKS", at: [0, 2, 0] }
      - { block: "OAK_PLANKS", at: [1, 1, 0] }
      - { block: "OAK_PLANKS", at: [1, 2, 0] }
    activate: { pulse: [1, 0, 0] }   # redstone east of the hinge → rising edge → swing (not near the generator)
    expect:
      - { type: mechanism_swung, at: [0, 0, 0] }
