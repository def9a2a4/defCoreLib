# Demo "showcases": multi-block machines that demonstrate plugin functionality.
# Placed as real, network-joined blocks. `at` is [dx,dy,dz] from the build origin; `facing` is the
# placement (clicked) face — the block's head then points the OPPOSITE way (a wall head faces away
# from the surface it hangs on). This matters for DIRECTIONAL blocks (drill bore, fan blow, millstone
# wall side): write the clicked face, not the direction you want it to point.
# KEY RULE (verified in RotationNetwork): a block connects only to the two neighbours
# ALONG ITS SPIN AXIS — facing down → Y axis (couples up/down); north/south → Z (couples N/S); east/west
# → X (couples E/W). So a power chain must run *along* the shared axis.
#   • millstone is always Y-axis (wall-mounted, powered from directly above/below) regardless of facing.
#   • drill/fan take their axis from facing.
#   • generator is a PASSIVE source (spins by default; redstone DISABLES it) — never pulse it.
#   • engine only produces power once FUELLED (the runner feeds it); idle/static until then.
#   • reverser only flips direction when it is itself redstone-powered.
#
# `activate`: passive | { fuel: [x,y,z] } | { pulse: [x,y,z] }.  `expect`: phase-2 assertions.
showcases:
  # ── Engine-powered (fuel source; static until the runner fuels them) ────
  - id: engine_fan
    name: "Engine → Fan"
    blurb: "A fuel-burning engine spins a shaft up into a fan that blows a gust of air."
    description: >
      The engine burns fuel — coal, charcoal, a lava bucket — to produce rotational power, measured in
      Power. That power runs up the shaft (a shaft just transmits rotation along its axis) into
      the fan, which turns it back into motion: a directed gust that pushes entities away from its face.
      The more surplus power on the network, the stronger the push.
    blocks:
      - { id: "rotation:engine", facing: down, at: [0, 0, 0] }   # Y axis (couples up)
      - { id: "rotation:shaft",  facing: down, at: [0, 1, 0] }
      - { id: "rotation:fan",    facing: down, at: [0, 2, 0] }   # floor fan = Y axis
    activate: { fuel: [0, 0, 0] }
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 2, 0] }

  - id: engine_millstone
    name: "Engine → Millstone"
    blurb: "A fuel-burning engine drives a vertical shaft down into a millstone that mills items."
    description: >
      A fuelled engine sends power down a vertical shaft into a millstone. The millstone is always a
      Y-axis machine — it draws power from directly above or below — and grinds items fed from an adjacent
      container into new materials according to its recipe set while its wheel spins. Stop feeding the
      engine fuel and the whole column winds down.
    blocks:
      # Millstone is Y-axis (powered from above), so the whole chain is a vertical Y column.
      - { id: "rotation:engine",     facing: down,  at: [0, 2, 0] }
      - { id: "rotation:shaft",      facing: down,  at: [0, 1, 0] }
      # `facing` is the clicked face → the head points the OPPOSITE way, so `south` mounts the
      # millstone onto the +z block below. (Axis is hardcoded Y regardless of facing.)
      - { id: "rotation:millstone", facing: south, at: [0, 0, 0] }
    vanilla:
      # The millstone reads items from the container on its mounting face — a barrel here.
      - { block: "BARREL", at: [0, 0, 1] }
    activate: { fuel: [0, 2, 0] }
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 0, 0] }

  # ── Generator-powered (passive: spins by default — do NOT pulse it) ─────
  - id: generator_drill
    name: "Generator → Drill"
    blurb: "A redstone generator powers a drill that bores forward through solid stone."
    description: >
      The generator is a passive power source — it spins on its own (and redstone DISABLES it, rather
      than enabling it). Its rotation feeds through a clutch into a drill, which bores into whatever block
      sits in front of its bit, breaking it in stages. A clutch passes power straight through like a
      shaft, but a redstone signal disengages it — a quick way to stop the drill without unpowering the
      generator. Because rotation only couples along a block's spin axis, the three blocks sit in a line.
    blocks:
      # Horizontal Z column (all Z axis, coupled along N/S). `facing` is the clicked face → the head
      # points the OPPOSITE way, so the drill is `south` to bore NORTH (−z) into the stone — NOT into
      # its own clutch on the +z side. Generator/clutch direction is irrelevant (Z axis either way).
      # The clutch transmits power like a shaft, but can be switched off with redstone to cut the drill.
      - { id: "rotation:generator", facing: south, at: [0, 0, 2] }
      - { id: "rotation:clutch",    facing: north, at: [0, 0, 1] }
      - { id: "rotation:drill",     facing: south, at: [0, 0, 0] }   # bores north (−z) into the stone
    vanilla:
      - { block: "STONE", at: [0, 0, -1] }   # the block the drill chews
    activate: passive
    expect:
      - { type: network_powered, at: [0, 0, 1] }
      - { type: spinning, at: [0, 0, 0] }

  - id: generator_fan
    name: "Generator → Fan"
    blurb: "A redstone generator spins a shaft up into a fan that blows a gust of air — no fuel needed."
    description: >
      A passive generator spins on its own and drives a shaft up into a fan. Unlike the fuel-burning
      engine, the generator needs no upkeep — it runs continuously until a redstone signal disables it.
      The fan turns that rotation into a directed gust that pushes entities away from its face.
    blocks:
      - { id: "rotation:generator", facing: down, at: [0, 0, 0] }
      - { id: "rotation:shaft",     facing: down, at: [0, 1, 0] }
      - { id: "rotation:fan",       facing: down, at: [0, 2, 0] }
    activate: passive
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 2, 0] }

  - id: generator_drawbridge
    name: "Generator → Reverser → Drawbridge"
    blurb: "A generator drives a rotator hinge through a lever-switched reverser; a pulse swings the drawbridge."
    description: >
      The rotator is a hinge: on a redstone pulse it gathers the connected planks into a moving structure
      and swings them as one — a drawbridge. Power reaches it from the generator behind, but passes through
      a reverser first: a floor lever beside the reverser is switched on, so the swing runs the reversed
      direction. Unlike the spinning machines, this is the mechanism system at work — real blocks are
      lifted into display entities, rotated, and set back down at their new orientation.
    blocks:
      # Z-axis chain: generator → reverser → rotator hinge. The generator sits two blocks BEHIND the hinge
      # so neither the swing pulse (east of the hinge) nor the lever (beside the reverser) can disable it.
      - { id: "rotation:generator", facing: north, at: [0, 0, -2] }
      - { id: "rotation:reverser",  facing: north, at: [0, 0, -1] }   # lever beside it → reverses the swing
      - { id: "rotation:rotator",   facing: south, at: [0, 0, 0] }    # hinge, Z axis
    vanilla:
      # Drawbridge leaf: a 2×2 vertical panel standing up BEHIND the hinge (+z), in the ZY plane at x=0.
      # Seated at floor so the bottom row [0,0,1] is face-adjacent to the hinge — flood-fill reaches it and
      # the swing still fires. (Capture emits these rest positions statically; no swing is rendered.)
      - { block: "OAK_PLANKS", at: [0, 0, 1] }
      - { block: "OAK_PLANKS", at: [0, 1, 1] }
      - { block: "OAK_PLANKS", at: [0, 0, 2] }
      - { block: "OAK_PLANKS", at: [0, 1, 2] }
      # Floor lever, switched on, face-adjacent to the reverser only → powers it (reverses direction).
      - { block: "LEVER", at: [-1, 0, -1], data: "[face=floor,facing=north,powered=true]" }
    activate: { pulse: [1, 0, 0] }   # redstone east of the hinge → rising edge → swing (not near the generator)
    expect:
      - { type: mechanism_swung, at: [0, 0, 0] }

  # ── Gears: power turning a 90° corner ───────────────────────────────────
  - id: gear_corner
    name: "Gearbox Corner"
    blurb: "A generator's vertical power meshes through gears to turn a 90° corner and drive a fan sideways."
    description: >
      A shaft only carries rotation straight along its axis; gears turn the corner. Here the passive
      generator spins a vertical (Y) gear, which meshes with a second gear mounted at 90° (X) beside it —
      a bevel pair. The horizontal gear then drives a fan on its own axis, so power that entered going up
      leaves going sideways.
    blocks:
      - { id: "rotation:generator", facing: down, at: [0, 0, 0] }   # Y source
      - { id: "rotation:gear",      facing: down, at: [0, 1, 0] }   # Y gear, driven from below
      - { id: "rotation:gear",      facing: west, at: [1, 1, 0] }   # X gear, meshes perpendicular
      - { id: "rotation:fan",       facing: west, at: [2, 1, 0] }   # X consumer
    activate: passive
    expect:
      - { type: network_powered, at: [1, 1, 0] }
      - { type: spinning, at: [2, 1, 0] }

  # ── Windmill: passive wind source (wall-mounted → horizontal power) ──────
  - id: windmill_drill
    name: "Windmill → Drill"
    blurb: "A wall-mounted huge windmill spins on the wind and bores a drill straight through solid stone."
    description: >
      Windmills are passive sources — they never need fuel or redstone, they just turn. Mounted on a wall
      the blades spin in a vertical plane, and (unlike a floor windmill) they deliver power horizontally
      along that spin axis. This one drives a shaft into a drill that bores forward through stone. Bigger
      banners mean a bigger windmill and far more power.
    blocks:
      # Wall windmill (spins on Z) feeds a Z shaft directly in front of it, into a drill boring +z.
      - { id: "rotation:huge_windmill", facing: south, at: [0, 0, 0] }   # wall_n → Z axis, blades face +z
      - { id: "rotation:shaft",         facing: north, at: [0, 0, 1] }
      - { id: "rotation:drill",         facing: north, at: [0, 0, 2] }   # head→south → bores +z into stone
    vanilla:
      - { block: "STONE", at: [0, 0, 3] }   # the block the drill chews
    activate: passive
    expect:
      - { type: network_powered, at: [0, 0, 1] }
      - { type: spinning, at: [0, 0, 2] }

  # ── Press: second processing machine (piston bobs under power) ──────────
  - id: generator_press
    name: "Generator → Press"
    blurb: "A generator drives a vertical shaft into a press whose piston bobs to squeeze a barrel's contents."
    description: >
      The press is a Y-axis machine like the millstone: it takes power from directly above and extracts
      juices, oils and dyes from items in the barrel it mounts on. A passive generator keeps its piston
      bobbing without any fuel. (This demo shows the motion; a running press needs items in the barrel to
      actually produce anything.)
    blocks:
      - { id: "rotation:generator", facing: down,  at: [0, 2, 0] }   # Y source
      - { id: "rotation:shaft",     facing: down,  at: [0, 1, 0] }
      - { id: "rotation:press",     facing: south, at: [0, 0, 0] }   # Y machine, mounts on +z block
    vanilla:
      - { block: "BARREL", at: [0, 0, 1] }   # container on the press's mounting face
    activate: passive
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 0, 0] }

  # ── Water wheel: water-driven source (needs a flowing current) ──────────
  - id: water_wheel_fan
    name: "Water Wheel → Fan"
    blurb: "Falling water turns a paddle wheel, which spins a shaft into a fan that blows a gust of air."
    description: >
      A water wheel is a source powered by moving water — not a still pool, but a real current
      pushing its paddles. A stream falls past its rim and sets it turning, and that rotation runs down a
      shaft into a fan. No fuel, no redstone, just flow.
    blocks:
      - { id: "rotation:water_wheel", facing: north, at: [0, 0, 0] }   # Z axle; spins on flow at its rim
      - { id: "rotation:shaft",       facing: north, at: [0, 0, 1] }
      - { id: "rotation:fan",         facing: north, at: [0, 0, 2] }
    vanilla:
      # Source falls into the wheel's EAST rim [1,0,0] (left air) → a downward current spins the wheel.
      # A stone lip channels it straight down rather than spreading wide. `physics: true` lets it flow.
      - { block: "WATER", at: [1, 1, 0], physics: true }
      - { block: "STONE", at: [2, 1, 0] }
      - { block: "STONE", at: [2, 0, 0] }
    activate: passive
    expect:
      - { type: spinning, at: [0, 0, 0] }
      - { type: network_powered, at: [0, 0, 1] }

  # ── Full processing line: drill → mill → mill → place (cobblestone into sand) ──
  - id: sand_generator
    name: "Cobblestone → Sand Factory"
    blurb: "A windmill-and-engine gearbox drills cobblestone, mills it down through gravel into sand, and a placer sets the sand back down."
    description: >
      A complete production line. A drill chews through the cobblestone in front of it
      (as if fed by a cobblestone generator), and the rubble drops into a hopper and barrel.
      Power comes from two passive-ish sources side by side — a large windmill and an engine —
      whose rotation is gathered through a clutch and a cluster of gears, then carried down
      vertical shafts to a pair of stacked millstones. The first millstone grinds cobblestone
      into gravel; the second grinds that gravel into sand. A placer at the foot of the column
      takes the finished sand and sets it down as a real block in the world.
    blocks:
      - { id: "rotation:gear",           facing: east,  at: [0, 0, 0] }
      - { id: "rotation:clutch",         facing: east,  at: [-1, 0, 0] }
      - { id: "rotation:gear",           facing: down,  at: [0, 0, -1] }
      - { id: "rotation:gear",           facing: north, at: [0, 0, 1] }
      - { id: "rotation:engine",         facing: south, at: [0, 0, 2] }
      - { id: "rotation:large_windmill", facing: north, at: [0, 0, 3] }
      - { id: "rotation:drill",          facing: east,  at: [-2, 0, 0] }
      - { id: "rotation:gear",           facing: down,  at: [-1, 0, -1] }
      - { id: "rotation:shaft",          facing: down,  at: [0, -1, -1] }
      - { id: "rotation:gear",           facing: down,  at: [-2, 0, -1] }
      - { id: "rotation:shaft",          facing: down,  at: [-1, -1, -1] }
      - { id: "rotation:millstone",      facing: west,  at: [-2, -1, -1] }
      - { id: "rotation:millstone",      facing: west,  at: [-1, -2, -1] }
      - { id: "rotation:shaft",          facing: down,  at: [0, -2, -1] }
      - { id: "rotation:placer",         facing: west,  at: [0, -3, -1] }
    vanilla:
      - { block: "LEVER",        at: [-1, 0, 1],   data: "[face=floor,facing=north,powered=true]" }
      - { block: "SMOOTH_STONE", at: [-1, -1, 1] }
      - { block: "BARREL",       at: [-3, -1, -1], data: "[facing=up,open=false]" }
      - { block: "HOPPER",       at: [-3, -1, 0],  data: "[enabled=true,facing=north]" }
      - { block: "COBBLESTONE",  at: [-3, 0, 0] }
      - { block: "BARREL",       at: [-2, -2, -1], data: "[facing=up,open=false]" }
      - { block: "BARREL",       at: [-1, -3, -1], data: "[facing=up,open=false]" }
      - { block: "SAND",         at: [1, -3, -1] }
    activate: passive
    expect: []
