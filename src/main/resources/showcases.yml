# Demo "showcases": multi-block machines that demonstrate plugin functionality.
# Placed as real, network-joined blocks. `at` is [dx,dy,dz] from the build origin; `facing` is the
# placement (clicked) face — the block's head then points the OPPOSITE way (a wall head faces away
# from the surface it hangs on). This matters for DIRECTIONAL blocks (drill bore, fan blow, millstone
# wall side): write the clicked face, not the direction you want it to point.
# KEY RULE (verified in RotationNetwork): a block connects only to the two neighbours
# ALONG ITS SPIN AXIS — facing down → Y axis (couples up/down); north/south → Z (couples N/S); east/west
# → X (couples E/W). So a power chain must run *along* the shared axis.
#   • millstone is always Y-axis (wall-mounted, powered from directly above/below) regardless of facing.
#   • drill/fan take their axis from facing.
#   • redstone motor is a PASSIVE source (spins by default; redstone DISABLES it) — never pulse it.
#   • engine only produces power once FUELLED (the runner feeds it); idle/static until then.
#   • reverser only flips direction when it is itself redstone-powered.
#
# Blocks may carry an explicit `state` (the corelib:state token, e.g. idle_z, east) — it overrides the
# placement_state_map and is REQUIRED to round-trip floor-mounted axes and pipe facings; exports emit it.
#
# `activate`: passive | { fuel: [x,y,z] } | { pulse: [x,y,z] }.  `expect`: phase-2 assertions.
showcases:
  # ── Full processing line: drill → mill → mill → place (cobblestone into sand) ──
  - id: sand_generator
    name: "Cobblestone → Sand Factory"
    blurb: "A windmill-and-engine gearbox drills cobblestone, mills it down through gravel into sand, and a placer sets the sand back down."
    description: >
      A complete production line. A drill chews through the cobblestone in front of it
      (as if fed by a cobblestone generator), and the rubble drops into a hopper and barrel.
      Power comes from two passive-ish sources side by side — a huge windmill and an engine,
      enough combined supply for the whole tower of machines — whose rotation is gathered
      through a clutch and a cluster of gears, then carried down
      vertical shafts to a pair of stacked millstones. The first millstone grinds cobblestone
      into gravel; the second grinds that gravel into sand. A placer at the foot of the column
      takes the finished sand and sets it down as a real block in the world.
    blocks:
      - { id: "mech:gear",           facing: east,  at: [0, 0, 0] }
      - { id: "mech:clutch",         facing: east,  at: [-1, 0, 0] }
      - { id: "mech:gear",           facing: down,  at: [0, 0, -1] }
      - { id: "mech:gear",           facing: north, at: [0, 0, 1] }
      - { id: "mech:engine",         facing: south, at: [0, 0, 2] }
      # Huge windmill (15) + engine (10) = 25 supply vs 17 demand (drill 5 + 2 millstones 10 + placer 2)
      # — a large windmill's 5 left the tower underpowered under the dfed5d0 power tiers.
      - { id: "mech:huge_windmill", facing: north, at: [0, 0, 3] }
      - { id: "mech:drill",          facing: east,  at: [-2, 0, 0] }
      - { id: "mech:gear",           facing: down,  at: [-1, 0, -1] }
      - { id: "mech:shaft",          facing: down,  at: [0, -1, -1] }
      - { id: "mech:gear",           facing: down,  at: [-2, 0, -1] }
      - { id: "mech:shaft",          facing: down,  at: [-1, -1, -1] }
      - { id: "mech:millstone",      facing: west,  at: [-2, -1, -1] }
      - { id: "mech:millstone",      facing: west,  at: [-1, -2, -1] }
      - { id: "mech:shaft",          facing: down,  at: [0, -2, -1] }
      - { id: "mech:placer",         facing: west,  at: [0, -3, -1] }
    vanilla:
      - { block: "LEVER",        at: [-1, 0, 1],   data: "[face=floor,facing=north,powered=true]" }
      - { block: "SMOOTH_STONE", at: [-1, -1, 1] }
      - { block: "BARREL",       at: [-3, -1, -1], data: "[facing=up,open=false]" }
      - { block: "HOPPER",       at: [-3, -1, 0],  data: "[enabled=true,facing=north]" }
      - { block: "COBBLESTONE",  at: [-3, 0, 0] }
      - { block: "BARREL",       at: [-2, -2, -1], data: "[facing=up,open=false]" }
      - { block: "BARREL",       at: [-1, -3, -1], data: "[facing=up,open=false]" }
      - { block: "SAND",         at: [1, -3, -1] }
    activate: passive
    expect: []

  # ── Engine-powered (fuel source; static until the runner fuels them) ────
  - id: engine_fan
    name: "Engine → Fan"
    blurb: "A fuel-burning engine spins a shaft up into a fan that blows a gust of air."
    description: >
      The engine burns fuel — coal, charcoal, a lava bucket — to produce rotational power, measured in
      Power. That power runs up the shaft (a shaft just transmits rotation along its axis) into
      the fan, which turns it back into motion: a directed gust that pushes entities away from its face.
      The more surplus power on the network, the stronger the push.
    blocks:
      - { id: "mech:engine", facing: down, at: [0, 0, 0] }   # Y axis (couples up)
      - { id: "mech:shaft",  facing: down, at: [0, 1, 0] }
      - { id: "mech:fan",    facing: down, at: [0, 2, 0] }   # floor fan = Y axis
    activate: { fuel: [0, 0, 0] }
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 2, 0] }

  - id: engine_millstone
    name: "Engine → Millstone"
    blurb: "A fuel-burning engine drives a vertical shaft down into a millstone that mills items."
    description: >
      A fuelled engine sends power down a vertical shaft into a millstone. The millstone is always a
      Y-axis machine — it draws power from directly above or below — and grinds items fed from an adjacent
      container into new materials according to its recipe set while its wheel spins. Stop feeding the
      engine fuel and the whole column winds down.
    blocks:
      # Millstone is Y-axis (powered from above), so the whole chain is a vertical Y column.
      - { id: "mech:engine",     facing: down,  at: [0, 2, 0] }
      - { id: "mech:shaft",      facing: down,  at: [0, 1, 0] }
      # `facing` is the clicked face → the head points the OPPOSITE way, so `south` mounts the
      # millstone onto the +z block below. (Axis is hardcoded Y regardless of facing.)
      - { id: "mech:millstone", facing: south, at: [0, 0, 0] }
    vanilla:
      # The millstone reads items from the container on its mounting face — a barrel here.
      - { block: "BARREL", at: [0, 0, 1] }
    activate: { fuel: [0, 2, 0] }
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 0, 0] }

  # ── Motor-powered (passive: spins by default — do NOT pulse it) ─────────
  - id: redstone_motor_drill
    name: "Motor → Drill"
    blurb: "A bank of five redstone motors powers a drill that bores forward through solid stone."
    description: >
      Motors are passive power sources — they spin on their own (and redstone DISABLES them, rather
      than enabling them) — but each one supplies just a single unit of power, and a drill demands five.
      So five motors sit coupled in a line, their rotation summing along the shared axle before it feeds
      through a clutch into the drill, which bores into whatever block sits in front of its bit, breaking
      it in stages. A clutch passes power straight through like a shaft, but a redstone signal disengages
      it — a quick way to stop the drill without unpowering the motors. Because rotation only couples
      along a block's spin axis, everything sits in one line.
    blocks:
      # Horizontal Z column (all Z axis, coupled along N/S). `facing` is the clicked face → the head
      # points the OPPOSITE way, so the drill is `south` to bore NORTH (−z) into the stone — NOT into
      # its own clutch on the +z side. Motor/clutch direction is irrelevant (Z axis either way).
      # The clutch transmits power like a shaft, but can be switched off with redstone to cut the drill.
      # FIVE motors: each supplies 1 power and the drill demands 5 (rotation-config power tiers) —
      # co-axial in-line sources sum their supply on one network.
      - { id: "mech:redstone_motor", facing: south, at: [0, 0, 2] }
      - { id: "mech:redstone_motor", facing: south, at: [0, 0, 3] }
      - { id: "mech:redstone_motor", facing: south, at: [0, 0, 4] }
      - { id: "mech:redstone_motor", facing: south, at: [0, 0, 5] }
      - { id: "mech:redstone_motor", facing: south, at: [0, 0, 6] }
      - { id: "mech:clutch",    facing: north, at: [0, 0, 1] }
      - { id: "mech:drill",     facing: south, at: [0, 0, 0] }   # bores north (−z) into the stone
    vanilla:
      - { block: "STONE", at: [0, 0, -1] }   # the block the drill chews
    activate: passive
    expect:
      - { type: network_powered, at: [0, 0, 1] }
      - { type: spinning, at: [0, 0, 0] }

  - id: redstone_motor_fan
    name: "Motor → Fan"
    blurb: "A pair of redstone motors spins a shaft up into a fan that blows a gust of air — no fuel needed."
    description: >
      Passive motors spin on their own and drive a shaft up into a fan. Unlike the fuel-burning
      engine, motors need no upkeep — they run continuously until a redstone signal disables them.
      Each motor supplies one unit of power and the fan demands two, so a second motor sits coupled
      below the first on the same vertical axle. The fan turns that rotation into a directed gust
      that pushes entities away from its face.
    blocks:
      # TWO motors: 1 power each vs the fan's demand of 2 — stacked co-axially on the Y axle.
      - { id: "mech:redstone_motor", facing: down, at: [0, -1, 0] }
      - { id: "mech:redstone_motor", facing: down, at: [0, 0, 0] }
      - { id: "mech:shaft",     facing: down, at: [0, 1, 0] }
      - { id: "mech:fan",       facing: down, at: [0, 2, 0] }
    activate: passive
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 2, 0] }

  - id: redstone_motor_drawbridge
    name: "Motor → Reverser → Drawbridge"
    blurb: "A motor drives a rotator hinge through a lever-switched reverser; a pulse swings the drawbridge."
    description: >
      The rotator is a hinge: on a redstone pulse it gathers the connected planks into a moving structure
      and swings them as one — a drawbridge. Power reaches it from the motor behind, but passes through
      a reverser first: a floor lever beside the reverser is switched on, so the swing runs the reversed
      direction. Unlike the spinning machines, this is the mechanism system at work — real blocks are
      lifted into display entities, rotated, and set back down at their new orientation.
    blocks:
      # Z-axis chain: motor → reverser → rotator hinge. The motor sits two blocks BEHIND the hinge
      # so neither the swing pulse (east of the hinge) nor the lever (beside the reverser) can disable it.
      - { id: "mech:redstone_motor", facing: north, at: [0, 0, -2] }
      - { id: "mech:reverser",  facing: north, at: [0, 0, -1] }   # lever beside it → reverses the swing
      - { id: "mech:rotator",   facing: south, at: [0, 0, 0] }    # hinge, Z axis
    vanilla:
      # Drawbridge leaf: a 2×2 vertical panel standing up BEHIND the hinge (+z), in the ZY plane at x=0.
      # Seated at floor so the bottom row [0,0,1] is face-adjacent to the hinge — flood-fill reaches it and
      # the swing still fires. (Capture emits these rest positions statically; no swing is rendered.)
      - { block: "OAK_PLANKS", at: [0, 0, 1] }
      - { block: "OAK_PLANKS", at: [0, 1, 1] }
      - { block: "OAK_PLANKS", at: [0, 0, 2] }
      - { block: "OAK_PLANKS", at: [0, 1, 2] }
      # Floor lever, switched on, face-adjacent to the reverser only → powers it (reverses direction).
      - { block: "LEVER", at: [-1, 0, -1], data: "[face=floor,facing=north,powered=true]" }
    activate: { pulse: [1, 0, 0] }   # redstone east of the hinge → rising edge → swing (not near the motor)
    expect:
      - { type: mechanism_swung, at: [0, 0, 0] }

  # ── Gears: power turning a 90° corner ───────────────────────────────────
  - id: gear_corner
    name: "Gearbox Corner"
    blurb: "A motor's vertical power meshes through gears to turn a 90° corner and drive a fan sideways."
    description: >
      A shaft only carries rotation straight along its axis; gears turn the corner. Here a pair of
      passive motors (one power unit each — the fan demands two) spins a vertical (Y) gear, which meshes
      with a second gear mounted at 90° (X) beside it — a bevel pair. The horizontal gear then drives a
      fan on its own axis, so power that entered going up leaves going sideways.
    blocks:
      # TWO motors: 1 power each vs the fan's demand of 2 — stacked co-axially on the Y axle.
      - { id: "mech:redstone_motor", facing: down, at: [0, -1, 0] }   # Y source
      - { id: "mech:redstone_motor", facing: down, at: [0, 0, 0] }   # Y source
      - { id: "mech:gear",      facing: down, at: [0, 1, 0] }   # Y gear, driven from below
      - { id: "mech:gear",      facing: west, at: [1, 1, 0] }   # X gear, meshes perpendicular
      - { id: "mech:fan",       facing: west, at: [2, 1, 0] }   # X consumer
    activate: passive
    expect:
      - { type: network_powered, at: [1, 1, 0] }
      - { type: spinning, at: [2, 1, 0] }

  # ── Windmill: passive wind source (wall-mounted → horizontal power) ──────
  - id: windmill_drill
    name: "Windmill → Drill"
    blurb: "A wall-mounted huge windmill spins on the wind and bores a drill straight through solid stone."
    description: >
      Windmills are passive sources — they never need fuel or redstone, they just turn. Mounted on a wall
      the blades spin in a vertical plane, and (unlike a floor windmill) they deliver power horizontally
      along that spin axis. This one drives a shaft into a drill that bores forward through stone. Bigger
      banners mean a bigger windmill and far more power.
    blocks:
      # Wall windmill (spins on Z) feeds a Z shaft directly in front of it, into a drill boring +z.
      - { id: "mech:huge_windmill", facing: south, at: [0, 0, 0] }   # wall_n → Z axis, blades face +z
      - { id: "mech:shaft",         facing: north, at: [0, 0, 1] }
      - { id: "mech:drill",         facing: north, at: [0, 0, 2] }   # head→south → bores +z into stone
    vanilla:
      - { block: "STONE", at: [0, 0, 3] }   # the block the drill chews
    activate: passive
    expect:
      - { type: network_powered, at: [0, 0, 1] }
      - { type: spinning, at: [0, 0, 2] }

  # ── Press: second processing machine (piston bobs under power) ──────────
  - id: redstone_motor_press
    name: "Motor → Press"
    blurb: "A tower of motors drives a vertical shaft into a press whose piston bobs to squeeze a barrel's contents."
    description: >
      The press is a Y-axis machine like the millstone: it takes power from directly above and extracts
      juices, oils and dyes from items in the barrel it mounts on. Passive motors keep its piston
      bobbing without any fuel — each supplies one unit of power against the press's demand of four,
      so four motors stack coupled on the same vertical axle. (This demo shows the motion; a running
      press needs items in the barrel to actually produce anything.)
    blocks:
      # FOUR motors: 1 power each vs the press's demand of 4 — stacked co-axially on the Y axle.
      - { id: "mech:redstone_motor", facing: down,  at: [0, 5, 0] }   # Y source
      - { id: "mech:redstone_motor", facing: down,  at: [0, 4, 0] }   # Y source
      - { id: "mech:redstone_motor", facing: down,  at: [0, 3, 0] }   # Y source
      - { id: "mech:redstone_motor", facing: down,  at: [0, 2, 0] }   # Y source
      - { id: "mech:shaft",     facing: down,  at: [0, 1, 0] }
      - { id: "mech:press",     facing: south, at: [0, 0, 0] }   # Y machine, mounts on +z block
    vanilla:
      - { block: "BARREL", at: [0, 0, 1] }   # container on the press's mounting face
    activate: passive
    expect:
      - { type: network_powered, at: [0, 1, 0] }
      - { type: spinning, at: [0, 0, 0] }

  # ── Water wheel: water-driven source (needs a flowing current) ──────────
  - id: water_wheel_fan
    name: "Water Wheel → Fan"
    blurb: "Falling water turns a paddle wheel, which spins a shaft into a fan that blows a gust of air."
    description: >
      A water wheel is a source powered by moving water — not a still pool, but a real current
      pushing its paddles. A stream falls past its rim and sets it turning, and that rotation runs down a
      shaft into a fan. No fuel, no redstone, just flow.
    blocks:
      - { id: "mech:water_wheel", facing: north, at: [0, 0, 0] }   # Z axle; spins on flow at its rim
      - { id: "mech:shaft",       facing: north, at: [0, 0, 1] }
      - { id: "mech:fan",         facing: north, at: [0, 0, 2] }
    vanilla:
      # Source falls into the wheel's EAST rim [1,0,0] (left air) → a downward current spins the wheel.
      # A stone lip channels it straight down rather than spreading wide. `physics: true` lets it flow.
      - { block: "WATER", at: [1, 1, 0], physics: true }
      - { block: "STONE", at: [2, 1, 0] }
      - { block: "STONE", at: [2, 0, 0] }
    activate: passive
    # Tests disabled: the water never flows, so the wheel doesn't spin and the network
    # never powers up. Re-enable these once flowing-water source works.
    # expect:
    #   - { type: spinning, at: [0, 0, 0] }
    #   - { type: network_powered, at: [0, 0, 1] }

  # ── Sampler: two passive sources feeding a gear corner ──────────────────
  - id: icon_machine
    name: "Water Wheel & Windmill Gearbox"
    blurb: "A water wheel and a windmill each drive a shaft into a pair of corner-meshed gears."
    description: >
      Two passive generators meeting at a gear corner. The water wheel spins by default and
      sends rotation west along a shaft; the windmill does the same to the north. Each shaft
      carries its rotation into a gear, and the two gears mesh perpendicular at the corner, so
      both sources turn the same coupled pair. A compact sampler of the rotation system —
      two power sources, shafts, and a gear corner in a single build.
    blocks:
      - { id: "mech:windmill",    facing: south, at: [0, 0, -2] }
      - { id: "mech:shaft",       facing: north, at: [0, 0, -1] }
      - { id: "mech:gear",        facing: south, at: [0, 0, 0] }    # Z axis
      - { id: "mech:gear",        facing: west,  at: [1, 0, 0] }    # X axis, meshes the corner
      - { id: "mech:shaft",       facing: west,  at: [2, 0, 0] }
      - { id: "mech:water_wheel", facing: east,  at: [3, 0, 0] }
    vanilla:
      # Water around the wheel (barriers that dammed it in the export are dropped; it never renders).
      - { block: "WATER", at: [3, 0, 1], data: "[level=8]", physics: true }
      - { block: "WATER", at: [3, 1, 0], data: "[level=0]", physics: true }
      - { block: "WATER", at: [3, 1, 1], data: "[level=1]", physics: true }
    activate: passive
    expect: []

  # ── Mechanical piston: rotation slides a rod; sticky head shoves the payload ──
  - id: double_extender_piston
    name: "Motor → Reverser → Mechanical Piston"
    blurb: "A motor drives a mechanical piston through a reverser; two poles give it a two-block reach that shoves an oak log."
    description: >
      The mechanical piston is a rotation-powered ram. A passive motor feeds power through a
      reverser and a shaft into the piston core; the core doesn't care which side the power
      comes from — it draws from whichever shaft sits against it. Clockwise spin slides the rod
      out and counter-clockwise pulls it back, and the reach is set by how many poles stack
      behind the core: two here, so it throws two blocks (a "double" reach). The sticky head
      carries the oak log in front of it along for the ride. A floor lever powers the reverser,
      flipping the spin direction to switch the stroke between extend and retract.
    blocks:
      - { id: "mech:redstone_motor", facing: west,  at: [-1, 0, 0] }   # passive X source
      - { id: "mech:reverser",       facing: west,  at: [0, 0, 0] }    # lever-driven direction flip
      - { id: "mech:shaft",          facing: east,  at: [1, 0, 0] }    # X-axis bridge (export said 'down' → miswired)
      - { id: "mech:piston_core",    facing: south, at: [2, 0, 0] }    # forward = north
      - { id: "mech:piston_head",    facing: south, at: [2, 0, -1] }   # front (sticky) head
      - { id: "mech:piston_pole",    facing: north, at: [2, 0, 1] }    # back poles → reach 2
      - { id: "mech:piston_pole",    facing: north, at: [2, 0, 2] }
    vanilla:
      - { block: "LEVER",   at: [0, 0, -1], data: "[face=floor,facing=south,powered=true]" }  # powers reverser
      - { block: "OAK_LOG", at: [2, 0, -2], data: "[axis=y]" }   # payload the head pushes
    activate: passive
    expect: []

  # ── Chain pulleys: power jumps a gap by chain, only around a CLOSED loop ────
  - id: chain_pulley_relay
    name: "Windmill → Chain Pulleys → Fan"
    blurb: "Three chain-linked pulleys form a closed loop that carries a windmill's power across two gaps to spin a fan."
    description: >
      A chain pulley jumps rotational power across a gap with no shaft between the two ends —
      link one to another with a chain and, once the links close into a loop, power flows all the
      way around; an open chain renders but carries nothing. Here a windmill feeds the first
      pulley directly below it, that pulley's chain reaches a second, the second's chain reaches a
      third, and the third's chain closes the loop back to the first. A gear and fan sit above the
      third pulley, drawing off the loop's power just like they would from an ordinary shaft. Each
      live chain link also costs a little power of its own (more for a longer span), so a loop this
      size needs a real source, not just a redstone motor.
    blocks:
      - { id: "mech:large_windmill", facing: down, at: [0, -1, 0] }   # passive Y source, 5 power
      - { id: "mech:chain_pulley",   facing: down, at: [0, 0, 0], link: [4, 0, 0] }
      - { id: "mech:chain_pulley",   facing: down, at: [4, 0, 0], link: [4, 0, 3] }
      - { id: "mech:chain_pulley",   facing: down, at: [4, 0, 3], link: [0, 0, 0] }   # closes the loop
      - { id: "mech:gear",           facing: down, at: [4, 1, 3] }   # Y axis, driven from the pulley below
      - { id: "mech:fan",            facing: down, at: [4, 2, 3] }
    activate: passive
    expect:
      - { type: network_powered, at: [4, 0, 3] }
      - { type: spinning, at: [4, 2, 3] }

  # ── Steam sieve: water wheels feed a boiler and a wet sieve; steam drives the sieve ──
  # Exported from a live build with ShowcaseExporter; water restored by hand (the glue-based
  # exporter can't capture fluids).
  - id: steam_sieve
    name: "Steam Sieve"
    blurb: "Water wheels drive pumps that feed a boiler and a sieve; the steam stack above works the sieve through an overhead gear bridge."
    description: >
      The full water-and-steam production chain. Three water wheels ride a stone-walled
      stream and gear their rotation west through a redstone dynamo into a pair of pumps:
      one pump lifts water through copper pipes into the boiler, the other feeds the sieve's
      supply line. A burner under the boiler turns that water into steam, and the steam
      piston on top drives the roof shaft run — north along the top and down an overhead
      gear bridge into the sieve, which shakes its contents down into barrels. A clutch
      branch south of the stack, gated by a redstone torch, ties the roof run into the pump
      train, and the dynamo's output feeds a comparator circuit with a digital power readout.
      An engine on the wheel axle stands by as backup power, plumbed to a fuel barrel.
    blocks:
      # Steam stack: burner heats the boiler; the steam piston on top is the power head.
      - { id: "mech:burner",       facing: down, state: "lit", at: [0, -2, 0] }
      - { id: "mech:boiler",       facing: down, state: "idle", at: [0, -1, 0] }
      - { id: "mech:steam_piston", facing: down, state: "running_z", at: [0, 0, 0] }
      # Roof shaft run north from the stack, over the gear bridge, down into the sieve.
      - { id: "mech:shaft", facing: south, state: "spinning_z", at: [0, 0, -1] }
      - { id: "mech:shaft", facing: down,  state: "spinning_z", at: [0, 0, -2] }
      - { id: "mech:shaft", facing: down,  state: "spinning_z", at: [0, 0, -3] }
      - { id: "mech:shaft", facing: north, state: "spinning_z", at: [0, 0, -4] }
