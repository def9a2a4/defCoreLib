# Vertical Slabs
# Half-blocks placed on N/S/E/W faces using BlockDisplay entities.

namespace: verticalslabs

textures:
  slab_placeholder: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMzNmYjdjOTJmZTE2NDlkNzZjNGFkOTc5ZWZjZDJjNDYwYjJlOTBiMjMyMGEyMzNlZjg1MTMzZGQ1NmJlZDg2YSJ9fX0="

blocks:

  # ─── Oak Vertical Slab ──────────────────────────────────────────────
  oak:
    name: "&fOak Vertical Slab"
    texture: "@slab_placeholder"
    item_material: OAK_SLAB
    item_glint: true
    drops: self
    place_sound: { sound: BLOCK_WOOD_PLACE, volume: 1.0, pitch: 1.0 }
    break_sound: { sound: BLOCK_WOOD_BREAK, volume: 1.0, pitch: 1.0 }
    placement:
      allowed_faces: [NORTH, SOUTH, EAST, WEST]
      require_solid: true
    default_state: north
    placement_state_map:
      NORTH: north
      SOUTH: south
      EAST: east
      WEST: west
    states:
      north:
        display_entities:
          - block_data: "minecraft:oak_slab"
            tag: slab
            transform: { left_rotation: [-90, 1, 0, 0], translation: [-0.5, -0.5, 0.0] }
      south:
        display_entities:
          - block_data: "minecraft:oak_slab"
            tag: slab
            transform: { left_rotation: [-90, 1, 0, 0], translation: [-0.5, -0.5, 0.5] }
      east:
        display_entities:
          - block_data: "minecraft:oak_slab"
            tag: slab
            transform: { left_rotation: [90, 0, 0, 1], translation: [0.5, -0.5, -0.5] }
      west:
        display_entities:
          - block_data: "minecraft:oak_slab"
            tag: slab
            transform: { left_rotation: [90, 0, 0, 1], translation: [0.0, -0.5, -0.5] }
    recipes:
      craft:
        shaped:
          - id: "oak_vslab_craft"
            amount: 6
            pattern: ["P", "P", "P"]
            key:
              P: { material: OAK_PLANKS }
      stonecutter:
        - id: "oak_vslab_from_planks"
          amount: 2
          input: { material: OAK_PLANKS }

