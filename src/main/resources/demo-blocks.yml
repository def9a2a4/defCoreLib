          - { material: WHITE_BANNER, tag: blade_d, transform: { translation: [0, 0.55, -0.375],   scale: [0.75, 0.75, 0.75], left_rotation: [180, 0, 1, -1] }, animation: { type: rotate, axis: [0,1,0], speed: 1.5 }, interpolation: 2 }
