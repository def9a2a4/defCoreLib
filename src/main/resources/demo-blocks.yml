# DefCoreLib Demo Blocks
# Each block exercises different features of the CustomHeadBlock system.
# Give all items with: /defcorelib give_demo

namespace: demo

blocks:

  # ─── 1. Candle ───────────────────────────────────────────────────────
  # Features: states, transitions, light, orientation-aware particles, sounds, recipes.
  candle:
    name: "&fCandle"
    lore:
      - "&7Right-click with flint & steel to light"
      - "&7Right-click again to extinguish"
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMmI3ZGJjZGE0NTRlYTdiMzhhYmM2NmNkZmVkOGU0ZTZjMDEyOTRmNmE5NjJlYzY2ZWYyMjY1MTBhZTM3MTcxYiJ9fX0="
    drops: self
    break_sound: { sound: BLOCK_CANDLE_BREAK, volume: 1.0, pitch: 1.0 }
    place_sound: { sound: BLOCK_CANDLE_PLACE, volume: 1.0, pitch: 1.0 }
    recipes:
      craft:
        shaped:
          - id: "candle_craft"
            amount: 1
            pattern: ["CC", "CC"]
            key:
              C: { material: CANDLE }
      stonecutter:
        - id: "candle_from_torch"
          amount: 1
          input: { material: TORCH }
    default_state: unlit
    states:
      unlit: {}
      lit:
        texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjFlOGQ0ZDlmNWZiMWQ4OTM3ZjhjMzA1NmY1ZTllMDU4ZTAwZmMxY2VjMTgwNDVkNDAzYjRmZDIwN2I3ZTI4NCJ9fX0="
        light: { level: 14, offset: [0, 1, 0] }
        particles:
          type: SMALL_FLAME
          count: 1
          speed: 0
          interval: 5
          floor_offset: [0, 0.55, 0]
          wall_offsets:
            NORTH: [0, 0.8, 0.25]
            SOUTH: [0, 0.8, -0.25]
            EAST: [-0.25, 0.8, 0]
            WEST: [0.25, 0.8, 0]
    transitions:
      - trigger: { type: interact, item: FLINT_AND_STEEL }
        from: unlit
        to: lit
        sound: ITEM_FLINTANDSTEEL_USE
      - trigger: { type: interact }
        from: lit
        to: unlit
        sound: BLOCK_CANDLE_EXTINGUISH

  # ─── 2. Jack O'Lantern ──────────────────────────────────────────────
  # Features: always-on light, no states.
  jack_o_lantern:
    name: "&6Jack O'Lantern"
    lore: ["&7Always glowing"]
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjc1MmE5YTlhZWMwZjE2MTgwYjhjYjAwMDMwNTFiYjUyOWQ3YTMyMTIwMWZlZTc3NjdhZTBjMmJhNmFmOTE0OSJ9fX0="
    drops: self
    light: { level: 14, offset: [0, 1, 0] }
    break_sound: { sound: BLOCK_WOOD_BREAK, volume: 0.7, pitch: 1.2 }
    recipes:
      craft:
        shapeless:
          - id: "lantern_from_candle"
            amount: 1
            ingredients:
              - { block: "demo:candle" }
              - { material: PUMPKIN }
      stonecutter:
        - id: "lantern_from_candle_sc"
          amount: 1
          input: { block: "demo:candle" }

