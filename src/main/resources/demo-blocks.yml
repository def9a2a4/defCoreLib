  # ─── 6. Redstone Candle ──────────────────────────────────────────────
  # Both manual toggle AND redstone. Redstone powers it on, manual click toggles.
  # Features: combining interaction + redstone triggers on same states.
  redstone_candle:
    name: "&dDemo Redstone Candle"
    lore: ["&7Flint & steel or redstone to light", "&7Click or remove power to extinguish"]
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMmI3ZGJjZGE0NTRlYTdiMzhhYmM2NmNkZmVkOGU0ZTZjMDEyOTRmNmE5NjJlYzY2ZWYyMjY1MTBhZTM3MTcxYiJ9fX0="
    drops: self

    default_state: unlit
    states:
      unlit: {}
      lit:
        texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNTlhYmUzMjQyZDRhN2YxNWE4OWQ0YzY4NTg3OTRkYTFlODBhOWFhNWY0NjNiOGM3ZTc5MjMzYTE3MTJlZDM2MCJ9fX0="
        light: { level: 14, offset: [0, 1, 0] }
        particles:
          type: SMALL_FLAME
          count: 1
          speed: 0
          interval: 5
          floor_offset: [0, 0.55, 0]
          wall_offsets:
            NORTH: [0, 0.8, 0.25]
            SOUTH: [0, 0.8, -0.25]
            EAST: [-0.25, 0.8, 0]
            WEST: [0.25, 0.8, 0]
    transitions:
      - trigger: { type: interact, item: FLINT_AND_STEEL }
        from: unlit
        to: lit
        sound: ITEM_FLINTANDSTEEL_USE
      - trigger: { type: interact }
        from: lit
        to: unlit
        sound: BLOCK_CANDLE_EXTINGUISH
      - trigger: { type: redstone, range: "1-15" }
        from: unlit
        to: lit
      - trigger: { type: redstone, range: "0" }
        from: lit
        to: unlit
    redstone:
      sensitivity: BINARY
      reader: DIRECT

  # ─── 7. Signal Meter ─────────────────────────────────────────────────
  # Particles scale with power. Off when unpowered, increasing dust when powered.
  # Features: Scaling on particle count/speed, states + redstone combined.
  signal_meter:
    name: "&aDemo Signal Meter"
    lore: ["&7Particles scale with redstone power", "&7Reads through walls"]
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvYzFkMDlhYTA3MTNjYzlhM2YzYzY4MDkyM2IxZjdiMjE2N2Y2NzMyMmZiN2U1ZjczMDE4ODEyZmVmNWZlMWEzYSJ9fX0="
