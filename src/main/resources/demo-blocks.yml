    lore: ["&7Red=off, Green=on", "&7Reads through walls"]
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMWY2MDY2NGI0MzQ1YmU3NWQwNGIzM2FiNzAzZjg5MjI5MDA1YTU0ZGE3ZjZmNDg1NjQ2NDQyYTdhMjkwZTc1OSJ9fX0="
    drops: self

    redstone:
      sensitivity: BINARY
      reader: EXTENDED
      texture_ranges:
        "0": "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMWY2MDY2NGI0MzQ1YmU3NWQwNGIzM2FiNzAzZjg5MjI5MDA1YTU0ZGE3ZjZmNDg1NjQ2NDQyYTdhMjkwZTc1OSJ9fX0="
