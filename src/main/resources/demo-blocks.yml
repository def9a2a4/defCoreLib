# DefCoreLib Demo Blocks
# Each block exercises different features of the CustomHeadBlock system.
# Give items with: /corelib give <id>

namespace: demo

blocks:

  # ─── 1. Candle ───────────────────────────────────────────────────────
  # Stateful: unlit/lit. Toggle with flint & steel or bare hand.
  # Features: states, transitions, light, orientation-aware particles, sounds.
  candle:
    name: "&fDemo Candle"
    lore:
      - "&7Right-click with flint & steel to light"
      - "&7Right-click again to extinguish"
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMmI3ZGJjZGE0NTRlYTdiMzhhYmM2NmNkZmVkOGU0ZTZjMDEyOTRmNmE5NjJlYzY2ZWYyMjY1MTBhZTM3MTcxYiJ9fX0="
    drops: self
    recipes:
      craft:
        shaped:
          - id: "candle_craft"
            amount: 1
            pattern: ["CC", "CC"]
            key:
              C: { material: CANDLE }
      stonecutter:
        - id: "candle_from_torch"
          amount: 1
          input: { material: TORCH }
    default_state: unlit
    states:
      unlit: {}
      lit:
        texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNTlhYmUzMjQyZDRhN2YxNWE4OWQ0YzY4NTg3OTRkYTFlODBhOWFhNWY0NjNiOGM3ZTc5MjMzYTE3MTJlZDM2MCJ9fX0="
        light: { level: 14, offset: [0, 1, 0] }
        particles:
          type: SMALL_FLAME
          count: 1
          speed: 0
          interval: 5
          floor_offset: [0, 0.55, 0]
          wall_offsets:
            NORTH: [0, 0.8, 0.25]
            SOUTH: [0, 0.8, -0.25]
            EAST: [-0.25, 0.8, 0]
            WEST: [0.25, 0.8, 0]
    transitions:
      - trigger: { type: interact, item: FLINT_AND_STEEL }
        from: unlit
        to: lit
        sound: ITEM_FLINTANDSTEEL_USE
      - trigger: { type: interact }
        from: lit
        to: unlit
        sound: BLOCK_CANDLE_EXTINGUISH

  # ─── 2. Pumpkin ──────────────────────────────────────────────────────
  # Always-glowing. No states, no redstone.
  # Features: light with no states (always on).
  pumpkin:
    name: "&6Demo Jack O'Lantern"
    lore: ["&7Always glowing"]
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjc1MmE5YTlhZWMwZjE2MTgwYjhjYjAwMDMwNTFiYjUyOWQ3YTMyMTIwMWZlZTc3NjdhZTBjMmJhNmFmOTE0OSJ9fX0="
    drops: self
    light: { level: 14, offset: [0, 1, 0] }
    recipes:
      craft:
        shapeless:
          - id: "pumpkin_from_candle"
            amount: 1
            ingredients:
              - { block: "demo:candle" }
              - { material: PUMPKIN }
      stonecutter:
        # Head-to-head: convert a candle into a pumpkin via stonecutter custom GUI
        - id: "pumpkin_from_candle_sc"
          amount: 1
          input: { block: "demo:candle" }

  # ─── 3. Workbench ────────────────────────────────────────────────────
  # Opens crafting table GUI on right-click.
  # Features: interactGUI.
  workbench:
    name: "&eDemo Workbench"
    lore: ["&7Right-click to open crafting table"]
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNzdlZDVlZjUzMzAwNzczNWVlNDQwZTg0ZjU1M2ViZDY4ODYxZTAyZmM1MmE1ZmY5M2MyN2I1ODQyOTdiMzUwYSJ9fX0="
    drops: self
    interact_gui: WORKBENCH

