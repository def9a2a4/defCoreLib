          speed: { base: 0.01, per_power: 0.005 }
          color: [255, 50, 50]
          size: 1.0
          interval: 3
          floor_offset: [0, 0.7, 0]
    transitions:
      - trigger: { type: redstone, range: "1-15" }
        from: off
        to: on
      - trigger: { type: redstone, range: "0" }
        from: on
        to: off
    redstone:
      sensitivity: LEVEL
      reader: EXTENDED

  # ─── 8. Pillar ───────────────────────────────────────────────────────
  # Block with a display entity floating above it.
  # Features: display entities, cancel_pistons.
  pillar:
    name: "&9Demo Pillar"
    lore: ["&7Block with floating display entity", "&7Cannot be pushed by pistons"]
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvNzdlZDVlZjUzMzAwNzczNWVlNDQwZTg0ZjU1M2ViZDY4ODYxZTAyZmM1MmE1ZmY5M2MyN2I1ODQyOTdiMzUwYSJ9fX0="
