# Sieve panning recipes — MachineRecipes schema (see MachineRecipes.java).
#   input:        vanilla Material (uppercase)
#   output:       vanilla Material or custom "mech:id"   (scalar single-output form)
#   amount:       output count (default 1)
#   input_amount: items consumed per cycle (default 1)
#   outputs:      list form for multi-output + per-output `chance` (0.0-1.0)
#
# Balance:
#   - Every output is chance-based: a cycle can consume its input and pay out nothing.
#   - Gravel is the ore-panning feedstock (nuggets/flint, rare gems); sand/red sand are
#     the fine-panning gamble; dirt/soul sand are flavor tables.
#   - Millstone keeps the deterministic GRAVEL -> SAND recipe as the reliable sand
#     source; the sieve's 35% sand is a by-product, not a substitute.
#   - Renewability: cobblestone -> gravel (millstone) -> sieve keeps nuggets/flint
#     renewable but lossy.

recipes:
  # ── Gravel: ore panning ──
  - input: GRAVEL
    outputs:
      - { output: SAND,             chance: 0.35 }   # by-product, not guaranteed
      - { output: FLINT,            chance: 0.25 }
      - { output: IRON_NUGGET,      chance: 0.15 }
      - { output: COPPER_NUGGET,    chance: 0.15 }
      - { output: GOLD_NUGGET,      chance: 0.08 }
      - { output: COAL,             chance: 0.05 }
      - { output: RAW_IRON,         chance: 0.02 }
      - { output: RAW_COPPER,       chance: 0.02 }
      - { output: AMETHYST_SHARD,   chance: 0.02 }
      - { output: LAPIS_LAZULI,     chance: 0.02 }
      - { output: EMERALD,          chance: 0.01 }
      - { output: DIAMOND,          chance: 0.003 }

  # ── Sand: fine panning (beach/river finds) ──
  - input: SAND
    outputs:
      - { output: CLAY_BALL,        chance: 0.20 }
      - { output: BONE_MEAL,        chance: 0.12 }
      - { output: GOLD_NUGGET,      chance: 0.10 }
      - { output: COPPER_NUGGET,    chance: 0.08 }
      - { output: REDSTONE,         chance: 0.05 }
      - { output: PRISMARINE_SHARD, chance: 0.03 }
      - { output: KELP,             chance: 0.03 }
      - { output: SEA_PICKLE,       chance: 0.01 }
      - { output: RAW_GOLD,         chance: 0.01 }

  # ── Red sand: gold-heavy badlands panning ──
  - input: RED_SAND
    outputs:
      - { output: GOLD_NUGGET,      chance: 0.18 }
      - { output: COPPER_NUGGET,    chance: 0.10 }
      - { output: REDSTONE,         chance: 0.08 }
      - { output: QUARTZ,           chance: 0.04 }
      - { output: RAW_GOLD,         chance: 0.02 }

  # ── Dirt: garden sifting ──
  - input: DIRT
    outputs:
      - { output: WHEAT_SEEDS,      chance: 0.15 }
      - { output: CLAY_BALL,        chance: 0.10 }
      - { output: BONE_MEAL,        chance: 0.10 }
      - { output: STICK,            chance: 0.10 }
      - { output: POTATO,           chance: 0.03 }
      - { output: CARROT,           chance: 0.03 }

  # ── Soul sand: nether panning ──
  - input: SOUL_SAND
    outputs:
      - { output: BONE_MEAL,        chance: 0.20 }
      - { output: QUARTZ,           chance: 0.12 }
      - { output: GOLD_NUGGET,      chance: 0.12 }
      - { output: GHAST_TEAR,       chance: 0.01 }
