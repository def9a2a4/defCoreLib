# BetterMinecarts tuning. Loaded by CartConfig; consumed by the cart / train / rail managers.

# Fuel accepted by the coal tender and blast-furnace cart inventories, and how long each item burns
# (game ticks) when a blast-furnace cart consumes it. Any material NOT listed here is rejected from
# a cart's fuel-only inventory. Values mirror vanilla furnace burn times.
fuel:
  COAL: 1600
  CHARCOAL: 1600
  COAL_BLOCK: 16000
  DRIED_KELP_BLOCK: 4000
  BLAZE_ROD: 2400

# Speeds are in blocks/tick (0.4 = vanilla 8 b/s, 1.0 = 20 b/s, 2.0 = 40 b/s).
carts:
  # Top speed of a plain furnace-minecart locomotive.
  furnace-cart-speed: 0.4
  # Top speed of a blast-furnace-cart locomotive (position-driven; independent of train length).
  blast-furnace-cart-speed: 1.0

  # ── Train drive (position-driven, arc-length rail-walking) ──
  # Arc-length gap kept between coupled carts.
  spacing: 1.5
  # Rail-walk sub-step granularity so fast carts never skip a rail block.
  sub-step: 0.25
  # Acceleration per tick per engine, scaled by 1 / (train length).
  base-accel: 0.02
  # Speed a coasting (engine-less, previously-pushed) train loses per tick.
  rolling-drag: 0.01
  # Max straight-line distance between two carts to couple them.
  max-link-distance: 3.0
  # Engine fuel level (ticks) below which a tender in the same train tops it up.
  feed-threshold-ticks: 600

  # ── Special rails ──
  # Cruise speed a controller rail enforces at full redstone signal (blocks/tick); scales with power/15.
  controller-max-speed: 1.0
  # Speed a train sheds per tick while braking down to a lower controller cap.
  brake-rate: 0.04
  # Multiplier on the vanilla-dispenser eject velocity when a dispenser minecart fires (1.0 = exactly
  # like a real dispenser; raise for a stronger pop).
  dispense-velocity: 1.0

# Emit dynamic light from a lit blast-furnace cart (level 5, only while burning) via the optional
# DynLight plugin (https://github.com/def9a2a4/dynlight). Purely a scoreboard-tag integration — no
# dependency; inert when DynLight is absent. Set false to never tag carts.
dynamic-lights: true

# Render the chain-coupler display between coupled carts. Trains work identically either way; set false
# to hide the chain visual entirely (e.g. if you dislike it or want fewer display entities).
chain-visuals: true
