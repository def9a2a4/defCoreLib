# Inventory-only custom items (non-placeable).
# Modeled as CustomHeadBlock entries with `item_material` + `placeable: false`, so they
# reuse createItem / recipe-ingredient validation / give with no parallel item system.
# (Real textures later via resource-pack custom_model_data; for now distinct by name.)
namespace: rotation
blocks:
  sweet_berry_juice:
    name: "&dSweet Berry Juice"
    lore:
      - "&7Pressed from sweet berries"
    item_material: HONEY_BOTTLE
    placeable: false

  plant_oil:
    name: "&ePlant Oil"
    lore:
      - "&7Burnable biofuel pressed from seeds"
    item_material: HONEY_BOTTLE
    placeable: false

  # Intermediate mechanical component crafted from iron + copper + planks.
  # Used as the core of the fan (and, later, the windmills). Non-placeable head
  # item — placeholder texture (Copper Gear skin) until real art lands.
  bearing:
    name: "&7Bearing"
    lore:
      - "&7A precision mechanical component"
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMWU1ZWRmZTkwMTU2Y2U5YjViNmI4MDc5M2RjMmNiZmU4NTBkZGVjODU2Yzk5ZWViZGUzMTc3NWNjZTk1NjA0MSJ9fX0="
    placeable: false
    recipes:
      craft:
        shaped:
          - pattern: ["WCW", "CIC", "WCW"]
            key:
              W: { tag: planks }
              C: { material: COPPER_INGOT }
              I: { material: IRON_INGOT }

  # Rotation Wrench: right-click rotation-power blocks to turn them. Identity is the
  # registry block_type PDC (rotation:wrench); behavior is in RotationBlocks.isWrench.
  wrench:
    name: "&6Rotation Wrench"
    lore:
      - "&7Rotates rotation-power blocks."
      - "&7Right-click a machine to turn it."
    item_material: GOLDEN_AXE
    placeable: false
    item_glint: true
    unbreakable: true
    recipes:
      craft:
        shaped:
          - pattern: ["CSC", "CS ", " S "]
            key:
              C: { material: COPPER_INGOT }
              S: { material: STICK }
