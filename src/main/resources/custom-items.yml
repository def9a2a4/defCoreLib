# Inventory-only custom items (non-placeable).
# Modeled as CustomHeadBlock entries with `item_material` + `placeable: false`, so they
# reuse createItem / recipe-ingredient validation / give with no parallel item system.
# (Real textures later via resource-pack custom_model_data; for now distinct by name.)
namespace: mech
blocks:
  # A real Potion of Instant Health under the hood (base type HEALING → red, heals on drink).
  sweet_berry_juice:
    name: "&dSweet Berry Juice"
    lore:
      - "&7Pressed from sweet berries"
      - "&7Drink for instant health"
    catalog_notes:
      - "&fMade by pressing sweet berries in the Extractor Press."
      - "&7It's a Potion of Instant Health under the hood — drink it to heal."
    item_material: POTION
    placeable: false
    potion:
      base_type: HEALING

  # Industrial oil pressed from seeds, bottled. A HONEY_BOTTLE reskin: an amber/yellow bottle
  # that reads as bottled oil, stacks to 16, and is not a machine input, so a Seed Oil item is
  # never mistaken for a press/mill ingredient (and it stays stackable for fuel / reagent use).
  #   Uses: engine fuel (RotationBlocks engine onInteract, by PDC) and the iron/copper
  #   lantern recipes (RotationBlocks.registerSeedOilRecipes, seed oil + string as wick).
  seed_oil:
    name: "&eSeed Oil"
    lore:
      - "&7Pressed from seeds"
      - "&7Fuel for engines and lanterns"
    catalog_notes:
      - "&fMade by pressing seeds in the [Extractor Press](mech:press)."
      - "&7Burn it in the [Engine](mech:engine) as fuel, or craft it with a string and"
      - "&7iron/copper nuggets into a lantern."
    item_material: HONEY_BOTTLE
    placeable: false

  # Ground from wheat in the millstone; feeds the flour -> dough -> bread chain.
  # SUGAR reskin (white powder), distinct by name (real texture via resource pack later).
  flour:
    name: "&fFlour"
    lore:
      - "&7Finely ground wheat"
    catalog_notes:
      - "&fGrind wheat in the [Millstone](mech:millstone) — 2 flour per wheat."
      - "&7Combine 3 flour + a water bucket into [Dough](mech:dough), then bake it into bread."
    item_material: SUGAR
    placeable: false

  # Crafted from 3 flour + a water bucket; smelt in a furnace or smoker -> bread.
  # Custom head skin (raw base64). The dough->bread step is registered in Java
  # (RotationBlocks.registerBakingRecipes) via an ExactChoice on this item, so it matches
  # by the item's PDC regardless of the base material.
  dough:
    name: "&eDough"
    lore:
      - "&7Unbaked — smelt it into bread"
    catalog_notes:
      - "&fCraft 3 [Flour](mech:flour) + a water bucket into dough (keeps the bucket)."
      - "&7Smelt dough in a furnace or smoker to bake it into bread."
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvODE2NmQ3OWRlNjRhYmI0NDU3YWI4N2ZhOGY2NzA2ZDU1Y2U2ODJlMTBkYjg0OWVhNmRkMTI0MDk1YjEyMjc2ZSJ9fX0="
    placeable: false
    recipes:
      craft:
        shapeless:
          - id: from_flour
            ingredients:
              - { block: mech:flour }
              - { block: mech:flour }
              - { block: mech:flour }
              - { material: WATER_BUCKET }

  # Pressed from sugarcane. A real potion under the hood — short Speed on drink.
  sugarcane_juice:
    name: "&aSugarcane Juice"
    lore:
      - "&7Pressed from sugarcane"
      - "&7Drink for a burst of speed"
    catalog_notes:
      - "&fPress sugarcane in the [Extractor Press](mech:press) to bottle it."
      - "&7Drink it for a short Speed boost."
    item_material: POTION
    placeable: false
    potion:
      effects:
        - { type: SPEED, duration: 600, amplifier: 0 }   # 600t = 30s
      color: "#B5D99C"

  # Pressed from glow berries. Cosmetic Glowing outline on drink (not powerful).
  glow_berry_juice:
    name: "&6Glow Berry Juice"
    lore:
      - "&7Pressed from glow berries"
      - "&7Drink to give off a soft glow"
    catalog_notes:
      - "&fPress glow berries in the [Extractor Press](mech:press)."
      - "&7Drink it to glow for a while."
    item_material: POTION
    placeable: false
    potion:
      effects:
        - { type: GLOWING, duration: 600, amplifier: 0 }   # 30s, cosmetic
      color: "#E08020"

  # Intermediate mechanical component: copper ingot core + 4 copper nuggets in a +.
  # The shared core of most rotation machines (windmills, fan, clutch, engine, …).
  # Non-placeable head item — copber2 art (assets/rotation/copber2-fwd.png).
  bearing:
    name: "&7Bearing"
    lore:
      - "&7A precision mechanical component"
    catalog_notes:
      - "&fThe core component most rotation machines are built from — windmills, the fan, the clutch, the engine, and more all need one."
      - "&7Craft a batch of these first when starting a mechanism build."
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMmQzMmJlY2RiNDYzMjYzMTRjZDBkMDU1MWIzYTNmMjhlMTc1NzQ2NjM4MDgzMDUwYWY4M2VkYmEyNDlhMWZmMiJ9fX0="
    placeable: false
    recipes:
      craft:
        shaped:
          - pattern: [" N ", "NCN", " N "]
            key:
              N: { material: COPPER_NUGGET }
              C: { material: COPPER_INGOT }

  # Rotation Wrench: right-click rotation-power blocks to turn them. Identity is the
  # registry block_type PDC (mech:wrench); behavior is in RotationBlocks.isWrench.
  wrench:
    name: "&6Rotation Wrench"
    lore:
      - "&7Rotates rotation-power blocks."
      - "&7Right-click a machine to turn it."
    catalog_notes:
      - "&fRight-click any rotation machine to rotate it in place."
      - "&fPlacing a machine points its face at the block face you click, so the wrench is the quick way to re-aim it afterward."
      - "&7Unbreakable — one wrench lasts forever."
    item_material: GOLDEN_AXE
    placeable: false
    item_glint: true
    unbreakable: true
    recipes:
      craft:
        shaped:
          - pattern: ["CSC", "CS ", " S "]
            key:
              C: { material: COPPER_INGOT }
              S: { material: STICK }
